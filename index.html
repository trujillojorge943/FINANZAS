function Cuentas({cuentas, setCuentas}) {
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [newC, setNewC] = useState({nombre:'', saldo:'', icono:'💰'});
  const [showMovId, setShowMovId] = useState(null);
  const [newMov, setNewMov] = useState({desc:'', monto:'', tipo:'egreso'});

  const agregarMovimiento = (id) => {
    if(!newMov.desc || !newMov.monto) return;
    const monto = parseFloat(newMov.monto);
    setCuentas(cuentas.map(c => c.id===id ? {
      ...c,
      saldo: newMov.tipo==='ingreso' ? c.saldo+monto : c.saldo-monto,
      movimientos: [{id:Date.now(), desc:newMov.desc, monto, tipo:newMov.tipo, fecha:today}, ...(c.movimientos||[])]
    } : c));
    setNewMov({desc:'', monto:'', tipo:'egreso'});
    setShowMovId(null);
  };

  const [showTransfer, setShowTransfer] = useState(false);
  const [transfer, setTransfer] = useState({origen:'', destino:'', monto:'', desc:'Transferencia'});

  const hacerTransferencia = () => {
    if(!transfer.origen||!transfer.destino||!transfer.monto||transfer.origen===transfer.destino) return;
    const monto = parseFloat(transfer.monto);
    const now = Date.now();
    setCuentas(cuentas.map(c=>{
      if(c.nombre===transfer.origen) return {...c, saldo:c.saldo-monto, movimientos:[{id:now,desc:`${transfer.desc} → ${transfer.destino}`,monto,tipo:'egreso',fecha:today},...(c.movimientos||[])]};
      if(c.nombre===transfer.destino) return {...c, saldo:c.saldo+monto, movimientos:[{id:now+1,desc:`${transfer.desc} ← ${transfer.origen}`,monto,tipo:'ingreso',fecha:today},...(c.movimientos||[])]};
      return c;
    }));
    setTransfer({origen:'',destino:'',monto:'',desc:'Transferencia'});
    setShowTransfer(false);
  };

  const todasCuentas = [...cuentas, {id:'ef', nombre:'Efectivo', icono:'💵', saldo:0}];

  return (
    <div>
      <div className="card">
        <div className="card-title">Transferir entre cuentas</div>
        {!showTransfer ? (
          <button className="btn-save" style={{width:'100%'}} onClick={()=>setShowTransfer(true)}>↔ Registrar transferencia</button>
        ) : (
          <FormBox>
            <FormRow label="Origen"><select value={transfer.origen} onChange={e=>setTransfer({...transfer,origen:e.target.value})}>
              <option value="">Seleccioná...</option>
              {todasCuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
            </select></FormRow>
            <FormRow label="Destino"><select value={transfer.destino} onChange={e=>setTransfer({...transfer,destino:e.target.value})}>
              <option value="">Seleccioná...</option>
              {todasCuentas.filter(c=>c.nombre!==transfer.origen).map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
            </select></FormRow>
            <FormRow label="Monto"><input type="number" value={transfer.monto} onChange={e=>setTransfer({...transfer,monto:e.target.value})} placeholder="0" /></FormRow>
            <FormRow label="Descripción"><input value={transfer.desc} onChange={e=>setTransfer({...transfer,desc:e.target.value})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={hacerTransferencia}>Confirmar</button>
              <button className="btn-cancel" onClick={()=>setShowTransfer(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}
      </div>
      {cuentas.map(c=>(
        <div key={c.id} className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:24}}>{c.icono}</span>
              <div>
                <div style={{fontWeight:700,fontSize:16}}>{c.nombre}</div>
                <div style={{fontSize:11,color:'#a8a29e'}}>Cuenta</div>
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              {editId===c.id ? (
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <input type="number" style={{width:130,fontSize:15,fontWeight:700,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.saldo||''} onChange={e=>setEditVals({...editVals,saldo:e.target.value})} />
                  <button className="btn-save" onClick={()=>{setCuentas(cuentas.map(x=>x.id===c.id?{...x,saldo:parseFloat(editVals.saldo)||x.saldo}:x));setEditId(null);}}>✓</button>
                  <button className="btn-cancel" onClick={()=>setEditId(null)}>✕</button>
                </div>
              ) : (
                <div>
                  <div style={{fontSize:22,fontWeight:700,color:c.saldo>=0?'#185FA5':'#A32D2D'}}>{fmt(c.saldo)}</div>
                  <button style={{fontSize:11,color:'#185FA5',background:'none',border:'none',cursor:'pointer'}} onClick={()=>{setEditId(c.id);setEditVals({saldo:c.saldo});}}>✏️ Editar saldo</button>
                </div>
              )}
            </div>
          </div>

          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <button className="btn-save" style={{flex:1,fontSize:13}} onClick={()=>setShowMovId(showMovId===c.id?null:c.id)}>+ Registrar movimiento</button>
          </div>

          {showMovId===c.id && (
            <FormBox>
              <FormRow label="Descripción"><input value={newMov.desc} onChange={e=>setNewMov({...newMov,desc:e.target.value})} placeholder="Ej: Pago Naranja X" /></FormRow>
              <FormRow label="Tipo">
                <select value={newMov.tipo} onChange={e=>setNewMov({...newMov,tipo:e.target.value})}>
                  <option value="egreso">Egreso</option>
                  <option value="ingreso">Ingreso</option>
                </select>
              </FormRow>
              <FormRow label="Monto"><input type="number" value={newMov.monto} onChange={e=>setNewMov({...newMov,monto:e.target.value})} placeholder="0" /></FormRow>
              <div style={{display:'flex',gap:8,marginTop:8}}>
                <button className="btn-save" onClick={()=>agregarMovimiento(c.id)}>Guardar</button>
                <button className="btn-cancel" onClick={()=>setShowMovId(null)}>Cancelar</button>
              </div>
            </FormBox>
          )}

          {(c.movimientos||[]).length > 0 && (
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'#78716c',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:8}}>Últimos movimientos</div>
              {(c.movimientos||[]).slice(0,10).map(m=>(
                <div key={m.id} className="row">
                  <div className="row-label">{m.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{m.fecha}</span></div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span className="row-val" style={{color:m.tipo==='ingreso'?'#3B6D11':'#A32D2D'}}>{m.tipo==='ingreso'?'+':'-'}{fmt(m.monto)}</span>
                    <button className="btn-icon" onClick={()=>setCuentas(cuentas.map(x=>x.id===c.id?{...x,saldo:m.tipo==='ingreso'?x.saldo-m.monto:x.saldo+m.monto,movimientos:(x.movimientos||[]).filter(mv=>mv.id!==m.id)}:x))}>🗑</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      ))}

      <div className="card">
        <div className="card-title">Agregar cuenta <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd && (
          <FormBox>
            <FormRow label="Nombre"><input value={newC.nombre} onChange={e=>setNewC({...newC,nombre:e.target.value})} placeholder="Ej: Mercado Pago" /></FormRow>
            <FormRow label="Saldo inicial"><input type="number" value={newC.saldo} onChange={e=>setNewC({...newC,saldo:e.target.value})} placeholder="0" /></FormRow>
            <FormRow label="Icono"><input value={newC.icono} onChange={e=>setNewC({...newC,icono:e.target.value})} placeholder="💰" style={{width:60}} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{if(!newC.nombre)return;setCuentas([...cuentas,{id:Date.now(),nombre:newC.nombre,saldo:parseFloat(newC.saldo)||0,icono:newC.icono,movimientos:[]}]);setNewC({nombre:'',saldo:'',icono:'💰'});setShowAdd(false);}}>Guardar</button>
              <button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}
      </div>
    </div>
  );
}

function Reporte({gastosVariables, ingresosExtra, naranja, bbva, cuentas}) {
  const [tipo, setTipo] = useState('gastos'); // 'gastos' | 'ingresos'
  const [agrup, setAgrup] = useState('semana'); // 'semana' | 'mes'

  // Get all periods (last 8 weeks or last 6 months)
  const getPeriodos = () => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    if(agrup==='semana') {
      // Start from current monday
      const lunActual = new Date(hoy);
      lunActual.setDate(hoy.getDate() - (hoy.getDay()===0?6:hoy.getDay()-1));
      return Array.from({length:13},(_,i)=>{
        const lun = new Date(lunActual); lun.setDate(lunActual.getDate() + i*7);
        const dom = new Date(lun); dom.setDate(lun.getDate()+6);
        return {
          key: lun.toISOString().split('T')[0],
          label: `${lun.getDate()}/${lun.getMonth()+1}`,
          desde: lun.toISOString().split('T')[0],
          hasta: dom.toISOString().split('T')[0],
        };
      });
    } else {
      // Start from current month + 12
      return Array.from({length:13},(_,i)=>{
        const d = new Date(hoy.getFullYear(), hoy.getMonth()+i, 1);
        const fin = new Date(d.getFullYear(), d.getMonth()+1, 0);
        const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        return {
          key: `${d.getFullYear()}-${d.getMonth()}`,
          label: `${meses[d.getMonth()]} ${d.getFullYear().toString().slice(2)}`,
          desde: d.toISOString().split('T')[0],
          hasta: fin.toISOString().split('T')[0],
        };
      });
    }
  };

  const periodos = getPeriodos();

  // Get rows (categories or types)
  const items = tipo==='gastos' ? gastosVariables : ingresosExtra;
  const getLabel = item => tipo==='gastos' ? item.cat : (item.tipo==='sueldo'?'Sueldo':item.tipo==='show'?'Show':'Trabajo');
  const labels = [...new Set(items.map(getLabel))].filter(Boolean);

  // Get value for cell
  const getCellVal = (label, periodo) => {
    return items
      .filter(x => getLabel(x)===label && x.fecha>=periodo.desde && x.fecha<=periodo.hasta)
      .reduce((a,b)=>a+b.monto,0);
  };
  const getColTotal = (periodo) => items.filter(x=>x.fecha>=periodo.desde&&x.fecha<=periodo.hasta).reduce((a,b)=>a+b.monto,0);
  const getRowTotal = (label) => items.filter(x=>getLabel(x)===label).reduce((a,b)=>a+b.monto,0);
  const grandTotal = items.reduce((a,b)=>a+b.monto,0);

  const isGasto = tipo==='gastos';
  const colorVal = isGasto ? 'var(--danger)' : 'var(--success)';
  const signo = isGasto ? '-' : '+';

  return (
    <div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <div className="tab-pills" style={{marginBottom:0}}>
          <button className={`tab-pill ${tipo==='gastos'?'active':''}`} onClick={()=>setTipo('gastos')}>➖ Gastos</button>
          <button className={`tab-pill ${tipo==='ingresos'?'active':''}`} onClick={()=>setTipo('ingresos')}>💰 Ingresos</button>
        </div>
        <div className="tab-pills" style={{marginBottom:0,marginLeft:'auto'}}>
          <button className={`tab-pill ${agrup==='semana'?'active':''}`} onClick={()=>setAgrup('semana')}>Sem.</button>
          <button className={`tab-pill ${agrup==='mes'?'active':''}`} onClick={()=>setAgrup('mes')}>Mes</button>
        </div>
      </div>

      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',margin:'0 -12px'}}>
        <table style={{borderCollapse:'collapse',minWidth:600,fontSize:12,width:'100%'}}>
          <thead>
            <tr style={{background:'var(--surface2)'}}>
              <td style={{padding:'10px 12px',fontWeight:700,color:'var(--text2)',position:'sticky',left:0,background:'var(--surface2)',zIndex:1,minWidth:110}}>Categoría</td>
              {periodos.map(p=>(
                <td key={p.key} style={{padding:'10px 8px',textAlign:'center',fontWeight:700,color:'var(--text2)',whiteSpace:'nowrap'}}>{p.label}</td>
              ))}
              <td style={{padding:'10px 8px',textAlign:'center',fontWeight:700,color:'var(--text)'}}>Total</td>
            </tr>
          </thead>
          <tbody>
            {labels.map((label,li)=>(
              <tr key={label} style={{background:li%2===0?'white':'var(--surface2)'}}>
                <td style={{padding:'8px 12px',fontWeight:600,position:'sticky',left:0,background:li%2===0?'white':'var(--surface2)',zIndex:1}}>{label}</td>
                {periodos.map(p=>{
                  const val = getCellVal(label, p);
                  return <td key={p.key} style={{padding:'8px',textAlign:'center',color:val>0?colorVal:'var(--text3)',fontWeight:val>0?600:400,fontFamily:'DM Mono,monospace'}}>
                    {val>0?`${signo}${fmt(val)}`:'—'}
                  </td>;
                })}
                <td style={{padding:'8px',textAlign:'center',fontWeight:700,color:colorVal,fontFamily:'DM Mono,monospace'}}>{signo}{fmt(getRowTotal(label))}</td>
              </tr>
            ))}
            {labels.length===0 && (
              <tr><td colSpan={periodos.length+2} style={{padding:20,textAlign:'center',color:'var(--text3)'}}>Sin datos</td></tr>
            )}
          </tbody>
          <tfoot>
            <tr style={{borderTop:'2px solid var(--border)',background:'var(--surface2)'}}>
              <td style={{padding:'10px 12px',fontWeight:700,position:'sticky',left:0,background:'var(--surface2)',zIndex:1}}>Total</td>
              {periodos.map(p=>{
                const val = getColTotal(p);
                return <td key={p.key} style={{padding:'10px 8px',textAlign:'center',fontWeight:700,color:val>0?colorVal:'var(--text3)',fontFamily:'DM Mono,monospace'}}>
                  {val>0?`${signo}${fmt(val)}`:'—'}
                </td>;
              })}
              <td style={{padding:'10px 8px',textAlign:'center',fontWeight:700,color:colorVal,fontFamily:'DM Mono,monospace'}}>{signo}{fmt(grandTotal)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

function Configuracion({categorias, setCategorias, tiposIngreso, setTiposIngreso}) {
  const [newCat, setNewCat] = useState('');
  const [editCatId, setEditCatId] = useState(null);
  const [editCatVal, setEditCatVal] = useState('');
  const [newTipo, setNewTipo] = useState('');
  const [editTipoId, setEditTipoId] = useState(null);
  const [editTipoVal, setEditTipoVal] = useState('');

  return (
    <div>
      <div className="card">
        <div className="card-title">Categorías de gastos</div>
        {categorias.map((cat, i)=>(
          <div key={i}>
            {editCatId===i ? (
              <div className="row">
                <input style={{flex:1,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6,marginRight:8}} value={editCatVal} onChange={e=>setEditCatVal(e.target.value)} />
                <button className="btn-save" onClick={()=>{if(editCatVal){setCategorias(categorias.map((c,j)=>j===i?editCatVal:c));setEditCatId(null);}}} style={{marginRight:4}}>✓</button>
                <button className="btn-cancel" onClick={()=>setEditCatId(null)}>✕</button>
              </div>
            ) : (
              <div className="row">
                <span className="row-label"><Badge text={cat} color="warning" /></span>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn-icon" onClick={()=>{setEditCatId(i);setEditCatVal(cat);}}>✏️</button>
                  <button className="btn-icon" onClick={()=>setCategorias(categorias.filter((_,j)=>j!==i))}>🗑</button>
                </div>
              </div>
            )}
          </div>
        ))}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <input style={{flex:1,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nueva categoría" />
          <button className="btn-save" onClick={()=>{if(newCat&&!categorias.includes(newCat)){setCategorias([...categorias,newCat]);setNewCat('');}}}>+ Agregar</button>
        </div>
      </div>

      <div className="card">
        <div className="card-title">Tipos de ingreso</div>
        {tiposIngreso.map((t,i)=>(
          <div key={i}>
            {editTipoId===i ? (
              <div className="row">
                <input style={{flex:1,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6,marginRight:8}} value={editTipoVal} onChange={e=>setEditTipoVal(e.target.value)} />
                <button className="btn-save" onClick={()=>{if(editTipoVal){setTiposIngreso(tiposIngreso.map((x,j)=>j===i?editTipoVal:x));setEditTipoId(null);}}} style={{marginRight:4}}>✓</button>
                <button className="btn-cancel" onClick={()=>setEditTipoId(null)}>✕</button>
              </div>
            ) : (
              <div className="row">
                <span className="row-label"><Badge text={t} color={i===0?'info':i===1?'success':'purple'} /></span>
                <div style={{display:'flex',gap:4}}>
                  <button className="btn-icon" onClick={()=>{setEditTipoId(i);setEditTipoVal(t);}}>✏️</button>
                  <button className="btn-icon" onClick={()=>setTiposIngreso(tiposIngreso.filter((_,j)=>j!==i))}>🗑</button>
                </div>
              </div>
            )}
          </div>
        ))}
        <div style={{display:'flex',gap:8,marginTop:12}}>
          <input style={{flex:1,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={newTipo} onChange={e=>setNewTipo(e.target.value)} placeholder="Nuevo tipo" />
          <button className="btn-save" onClick={()=>{if(newTipo&&!tiposIngreso.includes(newTipo)){setTiposIngreso([...tiposIngreso,newTipo]);setNewTipo('');}}}>+ Agregar</button>
        </div>
      </div>
    </div>
  );
}

function TarjetaCard({tarjeta, setTarjeta, categorias, gastosVariables, setGastosVariables, cuentas, setCuentas}) {
  const [showAdd, setShowAdd] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [showHistorial, setShowHistorial] = useState(false);
  const [showPago, setShowPago] = useState(false);
  const [pagoVals, setPagoVals] = useState({monto:'', cuenta:'BBVA', fecha:today});
  const [editHeader, setEditHeader] = useState({cierre:tarjeta.cierre,vencimiento:tarjeta.vencimiento,saldoBase:tarjeta.saldoBase});
  const [newC, setNewC] = useState({desc:'',monto:'',fecha:today,pago:'1',cuotas:'3',cat:categorias[0]||'Otro'});

  useEffect(()=>{
    const hoy=new Date(); hoy.setHours(0,0,0,0);
    const cierre=new Date(tarjeta.cierre+'T12:00:00');
    if(hoy>cierre && tarjeta.consumosBase.length>0){
      const proximosCuotas=tarjeta.consumosNuevos.filter(c=>c.esProximo);
      const historialEntry={id:Date.now(),cierre:tarjeta.cierre,vencimiento:tarjeta.vencimiento,saldoBase:tarjeta.saldoBase,consumos:[...tarjeta.consumosBase,...tarjeta.consumosNuevos.filter(c=>!c.esProximo)],total:tarjeta.saldoBase+tarjeta.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0)};
      const nextCierre=(()=>{const d=new Date(tarjeta.cierre+'T12:00:00');d.setMonth(d.getMonth()+1);return d.toISOString().split('T')[0];})();
      const nextVenc=(()=>{const d=new Date(tarjeta.vencimiento+'T12:00:00');d.setMonth(d.getMonth()+1);return d.toISOString().split('T')[0];})();
      const cuotasFuturas=tarjeta.consumosNuevos.filter(c=>!c.esProximo&&c.esCuotas&&c.cuotas>1).map(c=>({desc:c.desc+` (cuota 2/${c.cuotas})`,monto:c.montoCuota,fecha:nextCierre,esCuotaFutura:true,cuotasRestantes:c.cuotas-1,montoCuota:c.montoCuota}));
      const cuotasBaseRestantes=(tarjeta.consumosBase||[]).filter(c=>c.esCuotaFutura&&c.cuotasRestantes>1).map(c=>({...c,desc:c.desc.replace(/cuota \d+/,`cuota ${parseInt(c.desc.match(/cuota (\d+)/)?.[1]||1)+1}`),cuotasRestantes:c.cuotasRestantes-1,fecha:nextCierre}));
      const nextConsumosBase=[...proximosCuotas.map(c=>({desc:c.desc+(c.esCuotas?` (cuota 2/${c.cuotas})`:''),monto:c.montoCuota,fecha:c.fecha})),...cuotasFuturas,...cuotasBaseRestantes];
      setTarjeta({...tarjeta,cierre:nextCierre,vencimiento:nextVenc,saldoBase:0,consumosBase:nextConsumosBase,consumosNuevos:[],historial:[...(tarjeta.historial||[]),historialEntry]});
    }
  },[]);

  const actuales=tarjeta.consumosNuevos.filter(c=>!c.esProximo);
  const proximos=tarjeta.consumosNuevos.filter(c=>c.esProximo);
  const totalConsumosBase=tarjeta.consumosBase.reduce((a,b)=>a+b.monto,0);
  const totalNuevosActual=actuales.reduce((a,b)=>a+b.montoCuota,0);
  const totalNuevosProximo=proximos.reduce((a,b)=>a+b.montoCuota,0);
  const saldoTotal=tarjeta.saldoBase+totalConsumosBase+totalNuevosActual;
  const disp=Math.max(0,tarjeta.limite-saldoTotal);
  const pct=Math.min(100,Math.round(saldoTotal/tarjeta.limite*100));
  const barColor=pct>=80?'#A32D2D':pct>=50?'#854F0B':'#3B6D11';

  const addConsumo=()=>{
    if(!newC.desc||!newC.monto) return;
    const monto=parseFloat(newC.monto);
    const esCuotas=newC.pago==='z';
    const cuotas=esCuotas?parseInt(newC.cuotas):1;
    const montoCuota=esCuotas?Math.round(monto/cuotas):monto;
    const esProximo=newC.fecha>tarjeta.cierre;
    setTarjeta({...tarjeta,consumosNuevos:[...tarjeta.consumosNuevos,{id:Date.now(),desc:newC.desc,cat:newC.cat,montoTotal:monto,montoCuota,cuotas,esCuotas,fecha:newC.fecha,esProximo}]});
    setNewC({desc:'',monto:'',fecha:today,pago:'1',cuotas:'3',cat:categorias[0]||'Otro'});
    setShowAdd(false);
  };

  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{tarjeta.nombre}</div>
            <div style={{fontSize:11,color:'#a8a29e',marginTop:2}}>Cierra {fmtDate(tarjeta.cierre)} · Vence {fmtDate(tarjeta.vencimiento)}</div>
            {tarjeta.usd&&<div style={{fontSize:11,color:'#a8a29e'}}>{tarjeta.usd}</div>}
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:22,fontWeight:700,color:'#A32D2D'}}>{fmt(saldoTotal)}</div>
            <div style={{fontSize:11,color:'#a8a29e'}}>Límite: {fmt(tarjeta.limite)}</div>
            <button style={{fontSize:11,color:'#185FA5',background:'none',border:'none',cursor:'pointer',marginTop:2}} onClick={()=>setShowEdit(!showEdit)}>✏️ Editar</button>
          </div>
        </div>
        {showEdit&&(
          <FormBox>
            <FormRow label="Cierre"><input type="date" value={editHeader.cierre} onChange={e=>setEditHeader({...editHeader,cierre:e.target.value})} /></FormRow>
            <FormRow label="Vencimiento"><input type="date" value={editHeader.vencimiento} onChange={e=>setEditHeader({...editHeader,vencimiento:e.target.value})} /></FormRow>
            <FormRow label="Saldo base"><input type="number" value={editHeader.saldoBase} onChange={e=>setEditHeader({...editHeader,saldoBase:parseFloat(e.target.value)||0})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn-save" onClick={()=>{setTarjeta({...tarjeta,...editHeader});setShowEdit(false);}}>Guardar</button><button className="btn-cancel" onClick={()=>setShowEdit(false)}>Cancelar</button></div>
          </FormBox>
        )}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#78716c',marginBottom:4,marginTop:8}}>
          <span>Disponible: <strong style={{color:disp<50000?'#854F0B':'#3B6D11'}}>{fmt(disp)}</strong></span>
          <span>Usado: <strong style={{color:barColor}}>{pct}%</strong></span>
        </div>
        <div className="progress-bg"><div className="progress-bar" style={{width:`${pct}%`,background:barColor}} /></div>
      </div>

      <div className="card">
        <div className="card-title">Resumen actual <Badge text={`Cierra ${fmtDate(tarjeta.cierre)}`} color="warning" /></div>
        {tarjeta.consumosBase.map((c,i)=>(
          <div key={i} className="row">
            <div className="row-label">{c.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{fmtDate(c.fecha)}</span></div>
            <span className="row-val" style={{color:c.monto<0?'#3B6D11':'#A32D2D'}}>{c.monto<0?'+':''}{fmt(Math.abs(c.monto))}</span>
          </div>
        ))}
        {actuales.map(c=>(
          <div key={c.id}>
            <div className="row">
              <div className="row-label"><Badge text={c.esCuotas?`${c.cuotas}c`:'nuevo'} color={c.esCuotas?'warning':'new'} /> {c.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{c.esCuotas?`Cuota 1/${c.cuotas}: ${fmt(c.montoCuota)}`:fmtDate(c.fecha)}</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span className="row-val" style={{color:'#185FA5'}}>{fmt(c.montoCuota)}</span>
                <button className="btn-icon" onClick={()=>setTarjeta({...tarjeta,consumosNuevos:tarjeta.consumosNuevos.filter(x=>x.id!==c.id)})}>🗑</button>
              </div>
            </div>
          </div>
        ))}
        <div className="total-row"><span style={{fontWeight:600}}>Total resumen actual</span><span style={{fontWeight:700,color:'#A32D2D',fontSize:15}}>{fmt(totalConsumosBase+totalNuevosActual)}</span></div>
      </div>

      {proximos.length>0&&(
        <div className="card">
          <div className="card-title">Próximo resumen <Badge text="posterior al cierre" color="info" /></div>
          {proximos.map(c=>(
            <div key={c.id} className="row">
              <div className="row-label"><Badge text="próximo" color="info" /> {c.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{fmtDate(c.fecha)}</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span className="row-val" style={{color:'#185FA5'}}>{fmt(c.montoCuota)}</span>
                <button className="btn-icon" onClick={()=>setTarjeta({...tarjeta,consumosNuevos:tarjeta.consumosNuevos.filter(x=>x.id!==c.id)})}>🗑</button>
              </div>
            </div>
          ))}
          <div className="total-row"><span style={{fontWeight:600}}>Total próximo resumen</span><span style={{fontWeight:700,color:'#185FA5',fontSize:15}}>{fmt(totalNuevosProximo)}</span></div>
        </div>
      )}

      {(tarjeta.historial||[]).length>0&&(
        <div className="card">
          <div className="card-title" style={{cursor:'pointer'}} onClick={()=>setShowHistorial(!showHistorial)}>
            📋 Historial ({(tarjeta.historial||[]).length}) {showHistorial?'▲':'▼'}
          </div>
          {showHistorial&&(tarjeta.historial||[]).slice().reverse().map(h=>(
            <div key={h.id} style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid #F5F4F0'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div><div style={{fontWeight:600,fontSize:13}}>Resumen {fmtDate(h.cierre)}</div><div style={{fontSize:11,color:'#a8a29e'}}>Venció {fmtDate(h.vencimiento)}</div></div>
                <div style={{fontWeight:700,color:'#A32D2D',fontSize:15}}>{fmt(h.total||h.saldoBase)}</div>
              </div>
              {(h.consumos||[]).map((c,i)=>(
                <div key={i} className="row" style={{fontSize:12}}>
                  <span style={{color:'#78716c',flex:1}}>{c.desc}</span>
                  <span style={{fontWeight:600,color:c.monto<0?'#3B6D11':'#A32D2D'}}>{c.monto<0?'+':''}{fmt(Math.abs(c.monto))}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      <div className="card">
        <div className="card-title">Pagar tarjeta</div>
        {!showPago ? (
          <button className="btn-save" style={{width:'100%'}} onClick={()=>setShowPago(true)}>💳 Registrar pago</button>
        ) : (
          <FormBox>
            <div style={{fontSize:13,marginBottom:8}}>Total resumen actual: <strong style={{color:'#A32D2D'}}>{fmt(saldoTotal)}</strong></div>
            <FormRow label="Monto"><input type="number" value={pagoVals.monto} onChange={e=>setPagoVals({...pagoVals,monto:e.target.value})} placeholder={String((() => { const hoy=new Date(); hoy.setHours(0,0,0,0); const vD=new Date(tarjeta.vencimiento+"T12:00:00"); const uH=(tarjeta.historial||[]).length>0?tarjeta.historial[tarjeta.historial.length-1]:null; return uH&&hoy<=vD?(uH.total||uH.saldoBase):saldoTotal; })())} /></FormRow>
            <FormRow label="Cuenta origen"><select value={pagoVals.cuenta} onChange={e=>setPagoVals({...pagoVals,cuenta:e.target.value})}>
              {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
            </select></FormRow>
            <FormRow label="Fecha"><input type="date" value={pagoVals.fecha} onChange={e=>setPagoVals({...pagoVals,fecha:e.target.value})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const vencD = new Date(tarjeta.vencimiento+'T12:00:00');
                const ultimoH = (tarjeta.historial||[]).length>0 ? tarjeta.historial[tarjeta.historial.length-1] : null;
                const montoDefault = ultimoH && hoy<=vencD ? (ultimoH.total||ultimoH.saldoBase) : saldoTotal;
                const monto = parseFloat(pagoVals.monto)||montoDefault;
                const pagoId = Date.now();
                setCuentas(cuentas.map(c=>c.nombre===pagoVals.cuenta?{
                  ...c,
                  saldo: c.saldo-monto,
                  movimientos: [{id:pagoId,desc:`Pago ${tarjeta.nombre}`,monto,tipo:'egreso',fecha:pagoVals.fecha},...(c.movimientos||[])]
                }:c));
                setTarjeta({...tarjeta, pagos:[{id:pagoId,monto,cuenta:pagoVals.cuenta,fecha:pagoVals.fecha},...(tarjeta.pagos||[])]});
                setShowPago(false);
                setPagoVals({monto:'',cuenta:cuentas[0]?.nombre||'BBVA',fecha:today});
              }}>Confirmar pago</button>
              <button className="btn-cancel" onClick={()=>setShowPago(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}
      </div>

      {(tarjeta.pagos||[]).length > 0 && (
        <div className="card">
          <div className="card-title">Pagos realizados</div>
          {(tarjeta.pagos||[]).map(p=>(
            <div key={p.id} className="row">
              <div className="row-label">
                Pago {tarjeta.nombre}
                <br/><span style={{fontSize:11,color:'#a8a29e'}}>{p.fecha} · desde {p.cuenta}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span className="row-val" style={{color:'#3B6D11'}}>-{fmt(p.monto)}</span>
                <button className="btn-icon" onClick={()=>{
                  // Revertir saldo de la cuenta
                  setCuentas(cuentas.map(c=>c.nombre===p.cuenta?{
                    ...c,
                    saldo: c.saldo+p.monto,
                    movimientos: (c.movimientos||[]).filter(m=>m.id!==p.id)
                  }:c));
                  // Eliminar pago de tarjeta
                  setTarjeta({...tarjeta, pagos:(tarjeta.pagos||[]).filter(x=>x.id!==p.id)});
                }}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="card">
        <div className="card-title">Agregar consumo <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd&&(
          <Modal title={`Consumo — ${tarjeta.nombre}`} onClose={()=>setShowAdd(false)}>
            <MFormRow label="Descripción"><input value={newC.desc} onChange={e=>setNewC({...newC,desc:e.target.value})} placeholder="Ej: Supermercado" /></MFormRow>
            <MFormRow label="Monto total"><input type="number" value={newC.monto} onChange={e=>setNewC({...newC,monto:e.target.value})} placeholder="0" /></MFormRow>
            <MFormRow label="Fecha"><input type="date" value={newC.fecha} onChange={e=>setNewC({...newC,fecha:e.target.value})} /></MFormRow>
            <MFormRow label="Categoría"><select value={newC.cat} onChange={e=>setNewC({...newC,cat:e.target.value})}>{categorias.map(c=><option key={c} value={c}>{c}</option>)}</select></MFormRow>
            <MFormRow label="Forma de pago"><select value={newC.pago} onChange={e=>setNewC({...newC,pago:e.target.value})}><option value="1">Un pago</option><option value="z">En cuotas sin interés</option></select></MFormRow>
            {newC.pago==='z'&&<MFormRow label="Cuotas"><select value={newC.cuotas} onChange={e=>setNewC({...newC,cuotas:e.target.value})}><option value="2">2</option><option value="3">3</option><option value="6">6</option><option value="12">12</option></select></MFormRow>}
            {newC.pago==='z'&&newC.monto&&<div className="alert alert-info" style={{marginBottom:8,fontSize:12}}>1ra cuota: <strong>{fmt(Math.round(parseFloat(newC.monto)/parseInt(newC.cuotas)))}</strong></div>}
            {newC.fecha>tarjeta.cierre&&<div className="alert alert-warning" style={{marginBottom:8,fontSize:12}}>📅 Fecha posterior al cierre → próximo resumen</div>}
            <div className="modal-actions"><button className="btn-save" onClick={addConsumo}>Guardar</button><button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button></div>
          </Modal>
        )}
        {!showAdd&&<div style={{fontSize:12,color:'#a8a29e'}}>Los consumos posteriores al cierre van al próximo resumen automáticamente.</div>}
      </div>
    </div>
  );
}

function Tarjetas({naranja, setNaranja, bbva, setBbva, categorias, gastosVariables, setGastosVariables, cuentas, setCuentas}) {
  const [tab, setTab] = useState('naranja');
  return (
    <div>
      <div className="tab-pills">
        <button className={`tab-pill ${tab==='naranja'?'active':''}`} onClick={()=>setTab('naranja')}>Naranja X</button>
        <button className={`tab-pill ${tab==='bbva'?'active':''}`} onClick={()=>setTab('bbva')}>BBVA Visa</button>
      </div>
      {tab==='naranja' && <TarjetaCard tarjeta={naranja} setTarjeta={setNaranja} categorias={categorias} gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} cuentas={cuentas} setCuentas={setCuentas} />}
      {tab==='bbva' && <TarjetaCard tarjeta={bbva} setTarjeta={setBbva} categorias={categorias} gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} cuentas={cuentas} setCuentas={setCuentas} />}
    </div>
  );
}

// ---- APP ----
const TABS = [
  {id:'dashboard', label:'Inicio', icon:'🏠'},
  {id:'variables', label:'Gastos', icon:'➖'},
  {id:'ingresos', label:'Ingresos', icon:'💰'},
  {id:'proyeccion', label:'Proy.', icon:'📊'},
  {id:'cuentas', label:'Cuentas', icon:'🏦'},
  {id:'tarjetas', label:'Tarjetas', icon:'💳'},
  {id:'reporte', label:'Reporte', icon:'📋'},
  {id:'config', label:'Config.', icon:'⚙️'},
];

function App() {
  const [tab, setTab] = useState('dashboard');
  const [saldoBase, setSaldoBase] = useState(442000);
  const [gastosFijos, setGastosFijos] = useState(GASTOS_FIJOS_INIT);
  const [gastosSem, setGastosSem] = useState(GASTOS_SEM_INIT);
  const [gastosSemPagados, setGastosSemPagados] = useState([]);
  const [vencimientos, setVencimientos] = useState(VENC_INIT);
  const [vencFijos, setVencFijos] = useState(VENC_FIJOS_INIT);
  const [gastosVariables, setGastosVariables] = useState([]);
  const [ingresosExtra, setIngresosExtra] = useState(INGRESOS_INIT);
  const [sueldosCobrados, setSueldosCobrados] = useState([]);
  const [presupuestoVar, setPresupuestoVar] = useState(300000);
  const [categorias, setCategorias] = useState(CATS_INIT);
  const [tiposIngreso, setTiposIngreso] = useState(['Sueldo','Show','Trabajo particular']);
  const [cuentas, setCuentas] = useState(CUENTAS_INIT);
  const [saldoInicialProy, setSaldoInicialProy] = useState(null);
  const [naranja, setNaranja] = useState(NARANJA_INIT);
  const [bbva, setBbva] = useState(BBVA_INIT);
  const importRef = useRef();
  const isFirstRender = useRef(true);

  // Load from localStorage on mount
  useEffect(()=>{
    const d = loadFromStorage();
    if(d){
      if(d.saldoBase!==undefined) setSaldoBase(d.saldoBase);
      if(d.gastosFijos) setGastosFijos(d.gastosFijos);
      if(d.gastosSem) setGastosSem(d.gastosSem);
      if(d.gastosSemPagados) setGastosSemPagados(d.gastosSemPagados);
      if(d.vencimientos) setVencimientos(d.vencimientos);
      if(d.vencFijos) setVencFijos(d.vencFijos);
      if(d.gastosVariables) setGastosVariables(d.gastosVariables);
      if(d.ingresosExtra) setIngresosExtra(d.ingresosExtra);
      if(d.sueldosCobrados) setSueldosCobrados(d.sueldosCobrados);
      if(d.presupuestoVar) setPresupuestoVar(d.presupuestoVar);
      if(d.categorias) setCategorias(d.categorias);
      if(d.naranja) setNaranja(d.naranja);
      if(d.bbva) setBbva(d.bbva);
      if(d.cuentas) setCuentas(d.cuentas);
      if(d.tiposIngreso) setTiposIngreso(d.tiposIngreso);
      if(d.saldoInicialProy!==undefined && d.saldoInicialProy!==null) setSaldoInicialProy(d.saldoInicialProy);
      else if(d.cuentas) { const b=d.cuentas.find(c=>c.nombre==='BBVA'); if(b) setSaldoInicialProy(b.saldo); }
    }
    isFirstRender.current = false;
  },[]);

  // Save to localStorage on every change
  useEffect(()=>{
    if(isFirstRender.current) return;
    const data = {saldoBase,gastosFijos,gastosSem,gastosSemPagados,vencimientos,vencFijos,gastosVariables,ingresosExtra,sueldosCobrados,presupuestoVar,categorias,tiposIngreso,naranja,bbva,cuentas,saldoInicialProy};
    saveToStorage(data);
  },[saldoBase,gastosFijos,gastosSem,gastosSemPagados,vencimientos,vencFijos,gastosVariables,ingresosExtra,sueldosCobrados,presupuestoVar,categorias,tiposIngreso,naranja,bbva,cuentas,saldoInicialProy]);

  const getAllData = () => ({saldoBase,gastosFijos,gastosSem,gastosSemPagados,vencimientos,vencFijos,gastosVariables,ingresosExtra,sueldosCobrados,presupuestoVar,categorias,naranja,bbva});

  const handleImport = (data) => {
    if(data.saldoBase!==undefined) setSaldoBase(data.saldoBase);
    if(data.gastosFijos) setGastosFijos(data.gastosFijos);
    if(data.gastosSem) setGastosSem(data.gastosSem);
    if(data.gastosSemPagados) setGastosSemPagados(data.gastosSemPagados);
    if(data.vencimientos) setVencimientos(data.vencimientos);
    if(data.vencFijos) setVencFijos(data.vencFijos);
    if(data.gastosVariables) setGastosVariables(data.gastosVariables);
    if(data.ingresosExtra) setIngresosExtra(data.ingresosExtra);
    if(data.sueldosCobrados) setSueldosCobrados(data.sueldosCobrados);
    if(data.presupuestoVar) setPresupuestoVar(data.presupuestoVar);
    if(data.categorias) setCategorias(data.categorias);
    if(data.naranja) setNaranja(data.naranja);
    if(data.bbva) setBbva(data.bbva);
    if(data.cuentas) setCuentas(data.cuentas);
    if(data.tiposIngreso) setTiposIngreso(data.tiposIngreso);
    alert('✓ Datos importados correctamente');
  };

  const saldo = saldoBase
    + ingresosExtra.filter(x=>x.cobrado).reduce((a,b)=>a+b.monto,0)
    + sueldosCobrados.reduce((a,b)=>a+b.monto,0)
    - gastosVariables.reduce((a,b)=>a+b.monto,0)
    - gastosSemPagados.reduce((a,b)=>a+b.monto,0)
    - vencimientos.filter(x=>x.pagado&&x.tipo==='gasto').reduce((a,b)=>a+b.monto,0)
    - gastosFijos.filter(x=>x.pagado).reduce((a,b)=>a+b.monto,0);

  return (
    <div className="app">
      <div className="header">
        <h1>💸 Mis Finanzas</h1>
        <div className="io-btns">
          <button className="io-btn" onClick={()=>exportData(getAllData())}>⬇ Exportar</button>
          <button className="io-btn" onClick={()=>importRef.current.click()}>⬆ Importar</button>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])importData(e.target.files[0],handleImport);e.target.value='';}} />
        </div>
      </div>

      {TABS.map(t=>(
        <div key={t.id} id={`page-${t.id}`} className={`page ${tab===t.id?'active':''}`}>
          {tab==='dashboard' && t.id==='dashboard' && <Dashboard cuentas={cuentas} vencimientos={vencimientos} gastosVariables={gastosVariables} ingresosExtra={ingresosExtra} presupuestoVar={presupuestoVar} gastosFijos={gastosFijos} setGastosFijos={setGastosFijos} gastosSemPagados={gastosSemPagados} sueldosCobrados={sueldosCobrados} naranja={naranja} bbvaTarjeta={bbva} />}
          {tab==='variables' && t.id==='variables' && <Variables gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} categorias={categorias} setCategorias={setCategorias} gastosSem={gastosSem} cuentas={cuentas} setCuentas={setCuentas} naranja={naranja} setNaranja={setNaranja} bbva={bbva} setBbva={setBbva} />}
          {tab==='ingresos' && t.id==='ingresos' && <Ingresos ingresosExtra={ingresosExtra} setIngresosExtra={setIngresosExtra} tiposIngreso={tiposIngreso} cuentas={cuentas} setCuentas={setCuentas} />}
          {tab==='proyeccion' && t.id==='proyeccion' && <Proyeccion gastosFijos={gastosFijos} vencFijos={vencFijos} naranja={naranja} bbva={bbva} saldoBase={saldoBase} cuentas={cuentas} saldoInicialProy={saldoInicialProy} ingresosExtra={ingresosExtra} sueldosCobrados={sueldosCobrados} vencimientos={vencimientos} gastosSemPagados={gastosSemPagados} gastosVariables={gastosVariables} />}
          {tab==='cuentas' && t.id==='cuentas' && <Cuentas cuentas={cuentas} setCuentas={setCuentas} />}
          {tab==='tarjetas' && t.id==='tarjetas' && <Tarjetas naranja={naranja} setNaranja={setNaranja} bbva={bbva} setBbva={setBbva} categorias={categorias} gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} cuentas={cuentas} setCuentas={setCuentas} />}
          {tab==='reporte' && t.id==='reporte' && <Reporte gastosVariables={gastosVariables} ingresosExtra={ingresosExtra} naranja={naranja} bbva={bbva} cuentas={cuentas} />}
          {tab==='config' && t.id==='config' && <Configuracion categorias={categorias} setCategorias={setCategorias} tiposIngreso={tiposIngreso} setTiposIngreso={setTiposIngreso} />}
        </div>
      ))}

      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
