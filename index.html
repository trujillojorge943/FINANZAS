  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  
  :root {
    --bg: #F2F0EB;
    --surface: #FFFFFF;
    --surface2: #F7F5F0;
    --border: #E5E2DB;
    --text: #1A1916;
    --text2: #6B6860;
    --text3: #A8A59E;
    --accent: #2D5BE3;
    --accent-light: #EEF2FD;
    --success: #1A7A4A;
    --success-light: #E8F5EE;
    --danger: #C42B2B;
    --danger-light: #FDEAEA;
    --warning: #8A4A00;
    --warning-light: #FEF3E2;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family: 'DM Sans', -apple-system, sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    font-size: 14px; 
    line-height: 1.5;
  }
  
  .app { max-width: 520px; margin: 0 auto; padding: 0 12px 88px; }

  /* NAV */
  .nav { 
    position: fixed; bottom: 0; left: 0; right: 0; 
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); 
    display: flex; z-index: 100;

    padding-bottom: env(safe-area-inset-bottom);

  .nav-btn { 
    flex: 1; padding: 10px 4px 8px; font-size: 10px; font-weight: 600;
    border: none; background: none; cursor: pointer; 
    color: var(--text3); 
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    transition: color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn span:first-child { font-size: 20px; }

  .page { display: none; padding-top: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    padding: 16px; 
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card-title { 
    font-size: 11px; font-weight: 700; 
    color: var(--text3); 
    text-transform: uppercase; letter-spacing: 0.08em; 
    margin-bottom: 14px; 
    display: flex; justify-content: space-between; align-items: center; 
  }

  /* ROWS */
  .row { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 10px 0; 
    border-bottom: 1px solid var(--surface2); 
  }
  .row:last-child { border-bottom: none; }
  .row-label { color: var(--text2); flex: 1; font-size: 14px; }
  .row-val { font-weight: 700; font-size: 14px; }

  /* METRICS */
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .metric { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: var(--radius); 
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .metric-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }

  /* ALERTS */
  .alert { border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.5; font-weight: 500; }
  .alert-success { background: var(--success-light); color: var(--success); border: 1px solid #A8DCC0; }
  .alert-warning { background: var(--warning-light); color: var(--warning); border: 1px solid #F5C97A; }
  .alert-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #F0A0A0; }
  .alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid #B8C9F5; }

  /* BADGES */

  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-success { background: var(--success-light); color: var(--success); }
  .badge-warning { background: var(--warning-light); color: var(--warning); }
  .badge-info { background: var(--accent-light); color: var(--accent); }
  .badge-gray { background: var(--surface2); color: var(--text2); }

    width: 100%; font-size: 15px; padding: 12px 14px;

  .modal-actions .btn-cancel { padding: 14px 20px; }

  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  if (n < 0) return '-$' + Math.round(Math.abs(n)).toLocaleString('es-AR');

function fmtDate(s) { return s ? s.split('-').reverse().join('/') : '-'; }
function fmtDateShort(s) { if (!s) return ''; const p = s.split('-'); return p[2]+'/'+p[1]; }
function diasHasta(f) {
  const h = new Date(); h.setHours(0,0,0,0);
  const t = new Date(f+'T12:00:00'); t.setHours(0,0,0,0);
  const d = Math.round((t-h)/864e5);
  return d===0?'Hoy':d<0?'Vencido':`En ${d}d`;
}
function getLunes(offset) {
  const hoy = new Date(); hoy.setHours(12,0,0,0);
  const lun = new Date(hoy);
  lun.setDate(hoy.getDate() - (hoy.getDay()===0?6:hoy.getDay()-1));
  lun.setDate(lun.getDate() + offset*7);
  return lun.toISOString().split('T')[0];
}
function getDomingo(lunes) {
  const d = new Date(lunes+'T12:00:00'); d.setDate(d.getDate()+6);
  return d.toISOString().split('T')[0];
}
function getViernes(lunes) {
  const d = new Date(lunes+'T12:00:00'); d.setDate(d.getDate()+4);
  return d.toISOString().split('T')[0];
}
function inRange(fecha, lunes, domingo) {
  const f = new Date(fecha+'T12:00:00');
  const l = new Date(lunes+'T12:00:00');
  const d = new Date(domingo+'T12:00:00');
  return f>=l && f<=d;
}
function getViernesActual() {
  const d = new Date();
  d.setHours(12,0,0,0);
  const dow = d.getDay();
  const diff = (5-dow+7)%7||7;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}

function loadFromStorage() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
}
function exportData(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `finanzas_jorge_${today}.json`; a.click();
}
function importData(file, callback) {
  const r = new FileReader();
  r.onload = e => { try { callback(JSON.parse(e.target.result)); } catch { alert('Archivo inválido'); } };
  r.readAsText(file);
}

function agruparPorSemana(items, fechaKey='fecha') {
  const grupos = {};
  items.forEach(item => {
    const fecha = new Date(item[fechaKey]+'T12:00:00');
    const lunes = new Date(fecha);
    lunes.setDate(fecha.getDate() - (fecha.getDay()===0?6:fecha.getDay()-1));
    const key = lunes.toISOString().split('T')[0];
    if(!grupos[key]) grupos[key] = [];
    grupos[key].push(item);
  });
  return Object.entries(grupos).sort((a,b)=>b[0].localeCompare(a[0]));
}
function semanaLabel(lunesStr) {
  const l = new Date(lunesStr+'T12:00:00');
  const d = new Date(lunesStr+'T12:00:00'); d.setDate(d.getDate()+6);
  return `${d.getDate()}/${d.getMonth()+1} al ${l.getDate()}/${l.getMonth()+1}`;
}

function Dashboard({cuentas, vencimientos, gastosVariables, ingresosExtra, presupuestoVar, gastosFijos, setGastosFijos, gastosSemPagados, sueldosCobrados, naranja, bbvaTarjeta}) {
  const bbvaCuenta = cuentas.find(c=>c.nombre==='BBVA');
  const saldo = bbvaCuenta ? bbvaCuenta.saldo : 0;
  const sc = saldo<0?'#A32D2D':saldo<200000?'#854F0B':'#185FA5';

  // Calcular total de tarjetas dinámicamente
  const totalNaranja = naranja.saldoBase + naranja.consumosBase.reduce((a,b)=>a+b.monto,0) + naranja.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);
  const totalBBVA = bbvaTarjeta.saldoBase + bbvaTarjeta.consumosBase.reduce((a,b)=>a+b.monto,0) + bbvaTarjeta.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);

  const vencTarjetas = [
    {id:'nx', nombre:'Naranja X', fecha:naranja.vencimiento, monto:totalNaranja, tipo:'gasto', pagado:(naranja.pagos||[]).length>0},
    {id:'bbva', nombre:'BBVA Visa', fecha:bbvaTarjeta.vencimiento, monto:totalBBVA, tipo:'gasto', pagado:(bbvaTarjeta.pagos||[]).length>0},
  ];
  // Excluir vencimientos manuales que sean de tarjetas (para no duplicar)
  const vencSinTarjetas = vencimientos.filter(v=>!v.nombre.toLowerCase().includes('naranja')&&!v.nombre.toLowerCase().includes('bbva'));
  const sorted = [...vencTarjetas,...vencSinTarjetas].filter(x=>!x.pagado).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha)).slice(0,5);
  return (
    <div>

      <div className="metric-grid">
        <div className="metric"><div className="metric-label">Saldo disponible</div><div className="metric-value" style={{color:sc}}>{fmt(saldo)}</div></div>
      </div>

      {saldo<0 && <div className="alert alert-danger">⚠️ Saldo negativo. Revisá tus gastos.</div>}
    
      <div className="card">
        <div className="card-title">Próximos vencimientos</div>
        {sorted.length===0 && <div style={{color:'#78716c',fontSize:13}}>Sin vencimientos pendientes.</div>}
        {sorted.map(v=>(
          <div key={v.id} className="row">
            <div className="row-label">{v.nombre}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{fmtDate(v.fecha)} · {diasHasta(v.fecha)}</span></div>
            <span className="row-val" style={{color:v.tipo==='ingreso'?'#3B6D11':'#A32D2D'}}>{v.tipo==='ingreso'?'+':''}{fmt(v.monto)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- VENCIMIENTOS ----
function Vencimientos({vencimientos, setVencimientos, vencFijos, setVencFijos}) {
  // Auto-reset vencFijos if they were paid in a previous month
  React.useEffect(()=>{
    const hoy = new Date();
    const mesActual = hoy.getFullYear()+'-'+(hoy.getMonth()+1);
    const updated = vencFijos.map(v => {
      if(v.pagado && v.mesPago && v.mesPago !== mesActual) {
        return {...v, pagado:false, mesPago:null};
      }
      return v;
    });
    const hasChanges = updated.some((v,i)=>v.pagado!==vencFijos[i].pagado);
    if(hasChanges) setVencFijos(updated);
  }, []);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editFijoId, setEditFijoId] = useState(null);
  const [newV, setNewV] = useState({nombre:'',fecha:today,monto:'',tipo:'gasto'});
  const [editVals, setEditVals] = useState({});
  const [editFijoVals, setEditFijoVals] = useState({});
  return (
    <div>
      <div className="card">
        <div className="card-title">Vencimientos fijos mensuales</div>
        {vencFijos.map(v=>(
          <div key={v.id}>
            {editFijoId===v.id ? (
              <FormBox>
                <FormRow label="Nombre"><input value={editFijoVals.nombre||''} onChange={e=>setEditFijoVals({...editFijoVals,nombre:e.target.value})} /></FormRow>

                <FormRow label="Monto"><input type="number" value={editFijoVals.monto||''} onChange={e=>setEditFijoVals({...editFijoVals,monto:parseFloat(e.target.value)})} /></FormRow>

              </FormBox>
            ) : (
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={!!v.pagado} onClick={()=>{
                    const hoy = new Date();
                    const mesActual = hoy.getFullYear()+'-'+(hoy.getMonth()+1);

                      // Destildar (error)
                      setVencFijos(vencFijos.map(x=>x.id===v.id?{...x,pagado:false,mesPago:null}:x));

              </FormBox>
            ) : (

                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={v.pagado} onClick={()=>setVencimientos(vencimientos.map(x=>x.id===v.id?{...x,pagado:!x.pagado}:x))} />

// ---- VARIABLES ----
function Variables({gastosVariables, setGastosVariables, categorias, setCategorias, gastosSem, cuentas, setCuentas, naranja, setNaranja, bbva, setBbva}) {
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});
  const [newV, setNewV] = useState({desc:'', cat:categorias[0]||'Otro', monto:'', fecha:today, cuenta:'BBVA'});
  const [showAllGastos, setShowAllGastos] = useState(false);
  const [filtroCat, setFiltroCat] = useState('todas');
  const [filtroEstado, setFiltroEstado] = useState('todos');
  const [filtroPeriodo, setFiltroPeriodo] = useState('todo');
  const [showFiltros, setShowFiltros] = useState(false);
  const excluidos = (gastosSem||[]).map(g=>g.desc.toLowerCase());
  const esExcluido = desc => excluidos.some(e=>desc.toLowerCase().includes(e));
  const getPeriodoRange = (periodo) => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    if(periodo==='dia') {
      return [hoy.toISOString().split('T')[0], hoy.toISOString().split('T')[0]];
    } else if(periodo==='semana') {
      const lun = new Date(hoy); lun.setDate(hoy.getDate()-(hoy.getDay()===0?6:hoy.getDay()-1));
      const dom = new Date(lun); dom.setDate(lun.getDate()+6);
      return [lun.toISOString().split('T')[0], dom.toISOString().split('T')[0]];
    } else if(periodo==='mes') {
      const ini = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      const fin = new Date(hoy.getFullYear(), hoy.getMonth()+1, 0);
      return [ini.toISOString().split('T')[0], fin.toISOString().split('T')[0]];
    }
    return [null, null];
  };
  const [desde, hasta] = getPeriodoRange(filtroPeriodo);
  const gastosFiltrados = gastosVariables.filter(g => {
    if(filtroCat!=='todas' && g.cat!==filtroCat) return false;
    if(filtroEstado==='pagado' && !g.pagado) return false;
    if(filtroEstado==='pendiente' && g.pagado) return false;
    if(desde && g.fecha < desde) return false;
    if(hasta && g.fecha > hasta) return false;
    return true;
  });
  const total = gastosVariables.reduce((a,b)=>a+b.monto,0);
  const totalFiltrado = gastosFiltrados.reduce((a,b)=>a+b.monto,0);
  const hayFiltros = filtroCat!=='todas'||filtroEstado!=='todos'||filtroPeriodo!=='todo';

  return (
    <div>
      <div className="card">
        <div className="card-title">Registrar gasto <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd && (
          <Modal title="Registrar gasto" onClose={()=>setShowAdd(false)}>
            <MFormRow label="Descripción"><input value={newV.desc} onChange={e=>setNewV({...newV,desc:e.target.value})} placeholder="Ej: Cena" /></MFormRow>
            <MFormRow label="Categoría">
              <select value={newV.cat} onChange={e=>setNewV({...newV,cat:e.target.value})}>
                {categorias.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </MFormRow>
            <MFormRow label="Monto"><input type="number" value={newV.monto} onChange={e=>setNewV({...newV,monto:e.target.value})} placeholder="0" /></MFormRow>
            <MFormRow label="Fecha"><input type="date" value={newV.fecha} onChange={e=>setNewV({...newV,fecha:e.target.value})} /></MFormRow>
            <MFormRow label="Cuenta"><select value={newV.cuenta||'BBVA'} onChange={e=>setNewV({...newV,cuenta:e.target.value,tarjeta:'naranja',pago:'1',cuotas:'3'})}>
              {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
              <option value="Efectivo">💵 Efectivo</option>
              <option value="Tarjeta">💳 Tarjeta</option>
            </select></MFormRow>
            {newV.cuenta==='Tarjeta' && (
              <div>
                <MFormRow label="Tarjeta"><select value={newV.tarjeta||'naranja'} onChange={e=>setNewV({...newV,tarjeta:e.target.value})}>
                  <option value="naranja">Naranja X</option>
                  <option value="bbva">BBVA Visa</option>
                </select></MFormRow>
                <MFormRow label="Forma"><select value={newV.pago||'1'} onChange={e=>setNewV({...newV,pago:e.target.value})}>
                  <option value="1">Un pago</option>
                  <option value="z">Cuotas sin interés</option>
                </select></MFormRow>
                {newV.pago==='z' && <MFormRow label="Cuotas"><select value={newV.cuotas||'3'} onChange={e=>setNewV({...newV,cuotas:e.target.value})}>
                  <option value="2">2</option><option value="3">3</option><option value="6">6</option><option value="12">12</option>
                </select></MFormRow>}
                {newV.pago==='z' && newV.monto && <div className="alert alert-info" style={{marginBottom:8,fontSize:12}}>1ra cuota: <strong>{fmt(Math.round(parseFloat(newV.monto)/parseInt(newV.cuotas||3)))}</strong></div>}
                {newV.fecha>(newV.tarjeta==='naranja'?naranja.cierre:bbva.cierre) && <div className="alert alert-warning" style={{marginBottom:8,fontSize:12}}>📅 Fecha posterior al cierre → próximo resumen</div>}
              </div>
            )}
            {newV.desc && esExcluido(newV.desc) && <div className="alert alert-warning" style={{marginBottom:8,fontSize:12}}>⚠️ Este gasto está en Semanales.</div>}
            <div className="modal-actions">
              <button className="btn-save" onClick={()=>{
                if(!newV.desc||!newV.monto||esExcluido(newV.desc)) return;
                const monto = parseFloat(newV.monto);
                if(newV.cuenta==='Tarjeta') {
                  const esCuotas = newV.pago==='z';
                  const cuotas = esCuotas ? parseInt(newV.cuotas||3) : 1;
                  const montoCuota = esCuotas ? Math.round(monto/cuotas) : monto;
                  const tarjetaObj = newV.tarjeta==='naranja' ? naranja : bbva;
                  const setTarjetaFn = newV.tarjeta==='naranja' ? setNaranja : setBbva;
                  const esProximo = newV.fecha > tarjetaObj.cierre;
                  const nuevoConsumo = {id:Date.now(),desc:newV.desc,cat:newV.cat,montoTotal:monto,montoCuota,cuotas,esCuotas,fecha:newV.fecha,esProximo};
                  setTarjetaFn({...tarjetaObj, consumosNuevos:[...tarjetaObj.consumosNuevos, nuevoConsumo]});
                } else {
                  setGastosVariables([{id:Date.now(),desc:newV.desc,cat:newV.cat,monto,fecha:newV.fecha,cuenta:newV.cuenta||'BBVA',pagado:false},...gastosVariables]);
                }
                setNewV({desc:'',cat:categorias[0]||'Otro',monto:'',fecha:today,cuenta:'BBVA'});
                setShowAdd(false);
              }}>Guardar</button>
              <button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </Modal>
        )}
        <div style={{marginBottom:12}}>
          <button className="btn-add" onClick={()=>setShowFiltros(!showFiltros)} style={{marginBottom:8}}>
            🔍 Filtros {hayFiltros?<span style={{color:'#185FA5',fontWeight:700}}>●</span>:''}
          </button>
          {showFiltros && (
            <div style={{background:'var(--surface2)',borderRadius:10,padding:12,marginBottom:8,border:'1px solid var(--border)'}}>
              <div style={{display:'flex',gap:6,marginBottom:10}}>
                {['todo','dia','semana','mes'].map(p=>(
                  <button key={p} onClick={()=>setFiltroPeriodo(p)} style={{padding:'6px 12px',borderRadius:20,fontSize:12,fontWeight:600,border:'1.5px solid',borderColor:filtroPeriodo===p?'var(--accent)':'var(--border)',background:filtroPeriodo===p?'var(--accent)':'white',color:filtroPeriodo===p?'white':'var(--text2)',cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
                    {p==='todo'?'Todo':p==='dia'?'Hoy':p==='semana'?'Semana':'Mes'}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                <select style={{fontSize:12,padding:'6px 10px',border:'1.5px solid var(--border)',borderRadius:8,flex:1}} value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}>
                  <option value="todas">Todas las categorías</option>
                  {categorias.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <select style={{fontSize:12,padding:'6px 10px',border:'1.5px solid var(--border)',borderRadius:8,flex:1}} value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)}>
                  <option value="todos">Todos</option>
                  <option value="pagado">Pagados</option>
                  <option value="pendiente">Pendientes</option>
                </select>
              </div>
              {hayFiltros && <button style={{fontSize:12,color:'var(--danger)',background:'none',border:'none',cursor:'pointer',marginTop:8,fontWeight:600}} onClick={()=>{setFiltroCat('todas');setFiltroEstado('todos');setFiltroPeriodo('todo');}}>✕ Limpiar filtros</button>}
            </div>
          )}
          {hayFiltros && (
            <div style={{background:'var(--accent-light)',borderRadius:10,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,color:'var(--accent)',fontWeight:600}}>{gastosFiltrados.length} gasto{gastosFiltrados.length!==1?'s':''}</span>
              <span style={{fontSize:16,fontWeight:700,color:'var(--danger)',fontFamily:'DM Mono,monospace'}}>-{fmt(totalFiltrado)}</span>
            </div>
          )}
        </div>
        {gastosFiltrados.length===0 && <div style={{fontSize:13,color:'#a8a29e',padding:'8px 0'}}>Sin gastos para los filtros seleccionados.</div>}
        {(showAllGastos ? gastosFiltrados : gastosFiltrados.slice(0,10)).map(g=>(
          <div key={g.id}>
            {editId===g.id ? (
              <FormBox>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <input style={{flex:1,minWidth:100,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.desc||''} onChange={e=>setEditVals({...editVals,desc:e.target.value})} />
                  <input type="number" style={{width:110,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.monto||''} onChange={e=>setEditVals({...editVals,monto:e.target.value})} />
                  <input type="date" style={{fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.fecha||''} onChange={e=>setEditVals({...editVals,fecha:e.target.value})} />
                  <button className="btn-save" onClick={()=>{setGastosVariables(gastosVariables.map(x=>x.id===g.id?{...x,desc:editVals.desc,monto:parseFloat(editVals.monto),fecha:editVals.fecha||x.fecha}:x));setEditId(null);}}>✓</button>
                  <button className="btn-cancel" onClick={()=>setEditId(null)}>✕</button>
                </div>
              </FormBox>
            ) : (
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={!!g.pagado} onClick={()=>{
                    const updated = gastosVariables.map(x=>x.id===g.id?{...x,pagado:!x.pagado}:x);
                    setGastosVariables(updated);
                    if(g.cuenta && g.cuenta !== 'Tarjeta') {
                      const nuevoPagado = !g.pagado;
                      const delta = nuevoPagado ? -g.monto : g.monto;
                      setCuentas(prev=>prev.map(c=>c.nombre===g.cuenta?{
                        ...c,
                        saldo: c.saldo+delta,
                        movimientos: !nuevoPagado
                          ? (c.movimientos||[]).filter(m=>m.refId!==g.id)
                          : [{id:Date.now(),refId:g.id,desc:g.desc,monto:g.monto,tipo:'egreso',fecha:g.fecha},...(c.movimientos||[])]
                      }:c));
                    }
                  }} />
                  <div style={{opacity:g.pagado?0.5:1}}>
                    <span style={{textDecoration:g.pagado?'line-through':'none'}}><Badge text={g.cat} color="warning" /> {g.desc}</span>
                    <br/><span style={{fontSize:11,color:'#a8a29e'}}>{g.fecha} · </span>
                    <select style={{fontSize:11,border:'none',background:'transparent',color:'#854F0B',cursor:'pointer'}} value={g.cuenta||'BBVA'} onChange={e=>setGastosVariables(gastosVariables.map(x=>x.id===g.id?{...x,cuenta:e.target.value}:x))}>
                      {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                      <option value="Efectivo">Efectivo</option>
                      <option value="Tarjeta">Tarjeta</option>
                    </select>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="row-val" style={{color:g.pagado?'#a8a29e':'#854F0B'}}>{fmt(g.monto)}</span>
                  <button className="btn-icon" onClick={()=>{setEditId(g.id);setEditVals({desc:g.desc,monto:g.monto,fecha:g.fecha});}}>✏️</button>
                  <button className="btn-icon" onClick={()=>setGastosVariables(gastosVariables.filter(x=>x.id!==g.id))}>🗑</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {gastosFiltrados.length > 10 && <button className="btn-add" style={{width:'100%',marginTop:8}} onClick={()=>setShowAllGastos(!showAllGastos)}>{showAllGastos ? '▲ Ver menos' : `▼ Ver todos (${gastosFiltrados.length})`}</button>}
        <div className="total-row"><span style={{fontWeight:600}}>Total</span><span style={{fontWeight:700,color:'#854F0B',fontSize:15}}>{fmt(total)}</span></div>
      </div>
    </div>
  );
}

function Ingresos({ingresosExtra, setIngresosExtra, tiposIngreso, cuentas, setCuentas}) {
  const [showAdd, setShowAdd] = useState(false);
  const [filtro, setFiltro] = useState('todos');
  const [filtroPeriodo, setFiltroPeriodo] = useState('todo');
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});
  const [newI, setNewI] = useState({desc:'', tipo:'sueldo', monto:'', fecha:today, cuenta:'BBVA'});
  const [showAllIng, setShowAllIng] = useState(false);

  const getPeriodoRange = (periodo) => {
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    if(periodo==='dia') return [hoy.toISOString().split('T')[0], hoy.toISOString().split('T')[0]];
    if(periodo==='semana') {
      const lun = new Date(hoy); lun.setDate(hoy.getDate()-(hoy.getDay()===0?6:hoy.getDay()-1));
      const dom = new Date(lun); dom.setDate(lun.getDate()+6);
      return [lun.toISOString().split('T')[0], dom.toISOString().split('T')[0]];
    }
    if(periodo==='mes') {
      const ini = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      const fin = new Date(hoy.getFullYear(), hoy.getMonth()+1, 0);
      return [ini.toISOString().split('T')[0], fin.toISOString().split('T')[0]];
    }
    return [null, null];
  };
  const [desde, hasta] = getPeriodoRange(filtroPeriodo);

  const filtrados = ingresosExtra.filter(x => {
    if(filtro!=='todos' && x.tipo!==filtro) return false;
    if(desde && x.fecha < desde) return false;
    if(hasta && x.fecha > hasta) return false;
    return true;
  });
  const totalFiltrado = filtrados.reduce((a,b)=>a+b.monto,0);
  const totalSueldos = ingresosExtra.filter(x=>x.tipo==='sueldo').reduce((a,b)=>a+b.monto,0);
  const totalShows = ingresosExtra.filter(x=>x.tipo==='show').reduce((a,b)=>a+b.monto,0);
  const totalTrabajos = ingresosExtra.filter(x=>x.tipo==='trabajo').reduce((a,b)=>a+b.monto,0);

  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
        <div className="metric"><div className="metric-label">Sueldos</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>{fmt(totalSueldos)}</div></div>
        <div className="metric"><div className="metric-label">Shows</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>{fmt(totalShows)}</div></div>
        <div className="metric"><div className="metric-label">Trabajos</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>{fmt(totalTrabajos)}</div></div>
      </div>

      <div className="card">
        <div className="card-title">Registrar ingreso <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd && (
          <FormBox>
            <FormRow label="Tipo">
              <select value={newI.tipo} onChange={e=>setNewI({...newI,tipo:e.target.value})}>
                {(tiposIngreso||['Sueldo','Show','Trabajo particular']).map(t=><option key={t} value={t.toLowerCase().replace(/ /g,'_')}>{t}</option>)}
              </select>
            </FormRow>
            <FormRow label="Descripción"><input value={newI.desc} onChange={e=>setNewI({...newI,desc:e.target.value})} placeholder="Ej: Sueldo semana 1" /></FormRow>
            <FormRow label="Monto"><input type="number" value={newI.monto} onChange={e=>setNewI({...newI,monto:e.target.value})} /></FormRow>
            <FormRow label="Fecha"><input type="date" value={newI.fecha} onChange={e=>setNewI({...newI,fecha:e.target.value})} /></FormRow>
            <FormRow label="Cuenta"><select value={newI.cuenta||'BBVA'} onChange={e=>setNewI({...newI,cuenta:e.target.value})}>
              {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
              <option value="Efectivo">💵 Efectivo</option>
            </select></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{
                if(!newI.monto) return;
                setIngresosExtra([{id:Date.now(),desc:newI.desc||newI.tipo,tipo:newI.tipo,monto:parseFloat(newI.monto),fecha:newI.fecha,cobrado:false,cuenta:newI.cuenta||'BBVA'},...ingresosExtra]);
                setNewI({desc:'',tipo:'sueldo',monto:'',fecha:today});
                setShowAdd(false);
              }}>Guardar</button>
              <button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}

        <div className="tab-pills" style={{marginTop:12}}>
          {['todos','sueldo','show','trabajo'].map(f=>(
            <button key={f} className={`tab-pill ${filtro===f?'active':''}`} onClick={()=>setFiltro(f)}>
              {f==='todos'?'Todos':f==='sueldo'?'Sueldos':f==='show'?'Shows':'Trabajos'}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          {['todo','dia','semana','mes'].map(p=>(
            <button key={p} onClick={()=>setFiltroPeriodo(p)} style={{padding:'6px 12px',borderRadius:20,fontSize:12,fontWeight:600,border:'1.5px solid',borderColor:filtroPeriodo===p?'var(--accent)':'var(--border)',background:filtroPeriodo===p?'var(--accent)':'white',color:filtroPeriodo===p?'white':'var(--text2)',cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>
              {p==='todo'?'Todo':p==='dia'?'Hoy':p==='semana'?'Semana':'Mes'}
            </button>
          ))}
        </div>
        {(filtro!=='todos'||filtroPeriodo!=='todo') && (
          <div style={{background:'var(--success-light)',borderRadius:10,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:13,color:'var(--success)',fontWeight:600}}>{filtrados.length} ingreso{filtrados.length!==1?'s':''}</span>
            <span style={{fontSize:16,fontWeight:700,color:'var(--success)',fontFamily:'DM Mono,monospace'}}>+{fmt(totalFiltrado)}</span>
          </div>
        )}

        {filtrados.length===0 && <div style={{fontSize:13,color:'#a8a29e',padding:'8px 0'}}>Sin ingresos.</div>}
        {(showAllIng ? filtrados : filtrados.slice(0,10)).map(g=>(
          <div key={g.id}>
            {editId===g.id ? (
              <FormBox>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <input style={{flex:1,minWidth:100,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.desc||''} onChange={e=>setEditVals({...editVals,desc:e.target.value})} />
                  <input type="number" style={{width:110,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.monto||''} onChange={e=>setEditVals({...editVals,monto:e.target.value})} />
                  <input type="date" style={{fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.fecha||''} onChange={e=>setEditVals({...editVals,fecha:e.target.value})} />
                  <button className="btn-save" onClick={()=>{setIngresosExtra(ingresosExtra.map(x=>x.id===g.id?{...x,desc:editVals.desc,monto:parseFloat(editVals.monto),fecha:editVals.fecha||x.fecha}:x));setEditId(null);}}>Guardar</button>
                  <button className="btn-cancel" onClick={()=>setEditId(null)}>Cancelar</button>
                </div>
              </FormBox>
            ) : (
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={!!g.cobrado} onClick={()=>{
                    if(g._procesando) return;
                    const nuevoCobrado = !g.cobrado;
                    const updated = ingresosExtra.map(x=>x.id===g.id?{...x,cobrado:nuevoCobrado}:x);
                    setIngresosExtra(updated);
                    const cuenta = g.cuenta||'BBVA';
                    const delta = nuevoCobrado ? g.monto : -g.monto;
                    setCuentas(prev=>prev.map(c=>c.nombre===cuenta?{
                      ...c,
                      saldo: c.saldo+delta,
                      movimientos: !nuevoCobrado
                        ? (c.movimientos||[]).filter(m=>m.refId!==g.id)
                        : [{id:Date.now(),refId:g.id,desc:g.desc,monto:g.monto,tipo:'ingreso',fecha:g.fecha},...(c.movimientos||[])]
                    }:c));
                  }} />
                  <div style={{opacity:g.cobrado?0.5:1}}>
                    <span style={{textDecoration:g.cobrado?'line-through':'none'}}><Badge text={g.tipo==='sueldo'?'Sueldo':g.tipo==='show'?'Show':'Trabajo'} color={g.tipo==='sueldo'?'info':g.tipo==='show'?'success':'purple'} /> {g.desc}</span>
                    <br/><span style={{fontSize:11,color:'#a8a29e'}}>{g.fecha} · </span>
                    <select style={{fontSize:11,border:'none',background:'transparent',color:'#185FA5',cursor:'pointer'}} value={g.cuenta||'BBVA'} onChange={e=>setIngresosExtra(ingresosExtra.map(x=>x.id===g.id?{...x,cuenta:e.target.value}:x))}>
                      {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                      <option value="Efectivo">Efectivo</option>
                    </select>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="row-val" style={{color:g.cobrado?'#a8a29e':'#3B6D11'}}>+{fmt(g.monto)}</span>
                  <button className="btn-icon" onClick={()=>{setEditId(g.id);setEditVals({desc:g.desc,monto:g.monto,fecha:g.fecha});}}>✏️</button>
                  <button className="btn-icon" onClick={()=>setIngresosExtra(ingresosExtra.filter(x=>x.id!==g.id))}>🗑</button>
                </div>
              </div>
            )}
          </div>
        ))}
        {filtrados.length > 10 && <button className="btn-add" style={{width:'100%',marginTop:8}} onClick={()=>setShowAllIng(!showAllIng)}>{showAllIng ? '▲ Ver menos' : `▼ Ver todos (${filtrados.length})`}</button>}
      </div>
    </div>
  );
}

function Proyeccion({gastosFijos, vencFijos, naranja, bbva, saldoBase, cuentas, saldoInicialProy, ingresosExtra, sueldosCobrados, vencimientos, gastosSemPagados, gastosVariables}) {
  const totalNaranjaVencActual = naranja.historial&&naranja.historial.length>0 ? (naranja.historial[naranja.historial.length-1].total||naranja.historial[naranja.historial.length-1].saldoBase) : 0;
  const totalBBVAVencActual = bbva.historial&&bbva.historial.length>0 ? (bbva.historial[bbva.historial.length-1].total||bbva.historial[bbva.historial.length-1].saldoBase) : 0;
  const totalNaranjaProximo = naranja.saldoBase + naranja.consumosBase.reduce((a,b)=>a+b.monto,0) + naranja.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);
  const totalBBVAProximo = bbva.saldoBase + bbva.consumosBase.reduce((a,b)=>a+b.monto,0) + bbva.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);
  const totalNaranja = totalNaranjaVencActual||totalNaranjaProximo;
  const totalBBVA = totalBBVAVencActual||totalBBVAProximo;

  const saldoInicialProyectado = { current: saldoInicialProy || (cuentas.find(c=>c.nombre==='BBVA')?.saldo || 0) };

  const semanas = Array.from({length:12},(_,i)=>{
    const l = getLunes(i); return {lunes:l, domingo:getDomingo(l), viernes:getViernes(l)};
  });

  const [tooltip, setTooltip] = useState(null); // {tipo, items, x, y}

  const showTooltip = (e, items) => {
    if(!items || items.length===0) return;
    const rect = e.target.getBoundingClientRect();
    setTooltip({items, x: rect.left + rect.width/2, y: rect.top - 8});
  };

  const getVencSemana = (lunes, domingo) => {
    const items = [];

    ['2026-06-10','2026-07-10','2026-08-10','2026-09-10'].forEach(f=>{if(inRange(f,lunes,domingo))items.push({desc:'Naranja X',monto:f==='2026-06-10'?totalNaranjaVencActual||totalNaranja:totalNaranjaProximo,tipo:'gasto',alert:true});});
    ['2026-06-03','2026-07-03','2026-08-03'].forEach(f=>{if(inRange(f,lunes,domingo))items.push({desc:'BBVA',monto:f==='2026-06-03'?totalBBVAVencActual||totalBBVA:totalBBVAProximo,tipo:'gasto',alert:true});});
    return items;
  };

  return (
    <div>

      <div className="proj-wrap">
