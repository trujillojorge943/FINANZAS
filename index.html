// ---- UTILS ----
const fmt = n => {
  if (n < 0) return '-$' + Math.round(Math.abs(n)).toLocaleString('es-AR');
  return '$' + Math.round(n).toLocaleString('es-AR');
};
const today = new Date().toISOString().split('T')[0];
const STORAGE_KEY = 'jorge-finanzas-v11';

function fmtDate(s) { return s ? s.split('-').reverse().join('/') : '-'; }
function fmtDateShort(s) { if (!s) return ''; const p = s.split('-'); return p[2]+'/'+p[1]; }
function diasHasta(f) {
  const h = new Date(); h.setHours(0,0,0,0);
  const t = new Date(f+'T12:00:00'); t.setHours(0,0,0,0);
  const d = Math.round((t-h)/864e5);
  return d===0?'Hoy':d<0?'Vencido':`En ${d}d`;
}
function getLunes(offset) {
  const base = new Date('2026-06-01T12:00:00');
  base.setDate(base.getDate()+offset*7);
  return base.toISOString().split('T')[0];
}
function getDomingo(lunes) {
  const d = new Date(lunes+'T12:00:00'); d.setDate(d.getDate()+6);
  return d.toISOString().split('T')[0];
}
function getViernes(lunes) {
  const d = new Date(lunes+'T12:00:00'); d.setDate(d.getDate()+4);
  return d.toISOString().split('T')[0];
}
function inRange(fecha, lunes, domingo) {
  const f = new Date(fecha+'T12:00:00');
  const l = new Date(lunes+'T12:00:00');
  const d = new Date(domingo+'T12:00:00');
  return f>=l && f<=d;
}
function getViernesActual() {
  const d = new Date();
  d.setHours(12,0,0,0);
  const dow = d.getDay();
  const diff = (5-dow+7)%7||7;
  d.setDate(d.getDate()+diff);
  return d.toISOString().split('T')[0];
}

// ---- STORAGE ----
function saveToStorage(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const ind = document.getElementById('saved-indicator');
    if(ind){ ind.classList.add('show'); setTimeout(()=>ind.classList.remove('show'),1500); }
  } catch(e) { console.error(e); }
}
function loadFromStorage() {
  try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : null; } catch { return null; }
}
function exportData(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `finanzas_jorge_${today}.json`; a.click();
}
function importData(file, callback) {
  const r = new FileReader();
  r.onload = e => { try { callback(JSON.parse(e.target.result)); } catch { alert('Archivo inválido'); } };
  r.readAsText(file);
}

// ---- UI COMPONENTS ----
function Badge({text, color='gray'}) {
  return <span className={`badge badge-${color}`}>{text}</span>;
}
function BtnAdd({onClick, label='+ Agregar'}) {
  return <button className="btn-add" onClick={onClick}>{label}</button>;

function Tilde({checked, onClick}) {
  return <button className={`tilde ${checked?'checked':''}`} onClick={onClick}>{checked?'✓':''}</button>;

function FormRow({label, children}) {

// ---- DASHBOARD ----
function Dashboard({cuentas, vencimientos, gastosVariables, ingresosExtra, presupuestoVar, gastosFijos, setGastosFijos, gastosSemPagados, sueldosCobrados, naranja, bbvaTarjeta}) {
  const bbvaCuenta = cuentas.find(c=>c.nombre==='BBVA');
  const saldo = bbvaCuenta ? bbvaCuenta.saldo : 0;
  const sc = saldo<0?'#A32D2D':saldo<200000?'#854F0B':'#185FA5';

  // Calcular total de tarjetas dinámicamente
  const totalNaranja = naranja.saldoBase + naranja.consumosBase.reduce((a,b)=>a+b.monto,0) + naranja.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);
  const totalBBVA = bbvaTarjeta.saldoBase + bbvaTarjeta.consumosBase.reduce((a,b)=>a+b.monto,0) + bbvaTarjeta.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);

  const vencTarjetas = [
    {id:'nx', nombre:'Naranja X', fecha:naranja.vencimiento, monto:totalNaranja, tipo:'gasto', pagado:(naranja.pagos||[]).some(p=>p.fecha>=naranja.cierre)},
    {id:'bbva', nombre:'BBVA Visa', fecha:bbvaTarjeta.vencimiento, monto:totalBBVA, tipo:'gasto', pagado:(bbvaTarjeta.pagos||[]).some(p=>p.fecha>=bbvaTarjeta.cierre)},
  ];
  const sorted = [...vencTarjetas,...vencimientos].filter(x=>!x.pagado).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha)).slice(0,5);
  return (
    <div>

      <div className="metric-grid">
        <div className="metric"><div className="metric-label">Saldo disponible</div><div className="metric-value" style={{color:sc}}>{fmt(saldo)}</div></div>
      </div>
      <div className="card">
        <div className="card-title">Gastos fijos del mes</div>
        {gastosFijos.map(g=>(
          <div key={g.id} className="row">
            <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
              <Tilde checked={!!g.pagado} onClick={()=>setGastosFijos(gastosFijos.map(x=>x.id===g.id?{...x,pagado:!x.pagado}:x))} />
              <span style={{color:g.pagado?'#a8a29e':'#57534e',textDecoration:g.pagado?'line-through':'none'}}>{g.desc}</span>

// ---- VENCIMIENTOS ----
function Vencimientos({vencimientos, setVencimientos, vencFijos, setVencFijos}) {
  // Auto-reset vencFijos if they were paid in a previous month
  React.useEffect(()=>{
    const hoy = new Date();
    const mesActual = hoy.getFullYear()+'-'+(hoy.getMonth()+1);
    const updated = vencFijos.map(v => {
      if(v.pagado && v.mesPago && v.mesPago !== mesActual) {
        return {...v, pagado:false, mesPago:null};
      }
      return v;
    });
    const hasChanges = updated.some((v,i)=>v.pagado!==vencFijos[i].pagado);
    if(hasChanges) setVencFijos(updated);
  }, []);
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editFijoId, setEditFijoId] = useState(null);
  const [newV, setNewV] = useState({nombre:'',fecha:today,monto:'',tipo:'gasto'});

    <div>

        <div className="card-title">Vencimientos fijos mensuales</div>
        {vencFijos.map(v=>(
          <div key={v.id}>
            {editFijoId===v.id ? (
              <FormBox>
                <FormRow label="Nombre"><input value={editFijoVals.nombre||''} onChange={e=>setEditFijoVals({...editFijoVals,nombre:e.target.value})} /></FormRow>
                <FormRow label="Día"><input type="number" value={editFijoVals.dia||''} onChange={e=>setEditFijoVals({...editFijoVals,dia:parseInt(e.target.value)})} /></FormRow>
                <FormRow label="Monto"><input type="number" value={editFijoVals.monto||''} onChange={e=>setEditFijoVals({...editFijoVals,monto:parseFloat(e.target.value)})} /></FormRow>
                <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn-save" onClick={()=>{setVencFijos(vencFijos.map(x=>x.id===v.id?{...x,...editFijoVals}:x));setEditFijoId(null);}}>Guardar</button><button className="btn-cancel" onClick={()=>setEditFijoId(null)}>Cancelar</button></div>
              </FormBox>
            ) : (
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={!!v.pagado} onClick={()=>{
                    const hoy = new Date();
                    const mesActual = hoy.getFullYear()+'-'+(hoy.getMonth()+1);
                    if(v.pagado && v.mesPago===mesActual) {
                      // Destildar (error)
                      setVencFijos(vencFijos.map(x=>x.id===v.id?{...x,pagado:false,mesPago:null}:x));
                    } else {
                      // Tildar con mes actual
                      setVencFijos(vencFijos.map(x=>x.id===v.id?{...x,pagado:true,mesPago:mesActual}:x));
                    }
                  }} />
                  <div style={{opacity:v.pagado?0.4:1}}>
                    <div style={{fontWeight:500,textDecoration:v.pagado?'line-through':'none'}}>{v.nombre}</div>
                    <div style={{fontSize:11,color:'#a8a29e'}}>Día {v.dia} de cada mes</div>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="row-val" style={{color:v.pagado?'#3B6D11':'#A32D2D'}}>{v.pagado?'✓ ':''}{fmt(v.monto)}</span>

            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{if(!newV.nombre||!newV.monto)return;setVencimientos([...vencimientos,{id:Date.now(),...newV,monto:parseFloat(newV.monto),pagado:false}]);setNewV({nombre:'',fecha:today,monto:'',tipo:'gasto'});setShowAdd(false);}}>Guardar</button>
              <button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button>

        )}
        {[...vencimientos].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha)).map(v=>(

                <FormRow label="Fecha"><input type="date" value={editVals.fecha||''} onChange={e=>setEditVals({...editVals,fecha:e.target.value})} /></FormRow>
                <FormRow label="Monto"><input type="number" value={editVals.monto||''} onChange={e=>setEditVals({...editVals,monto:e.target.value})} /></FormRow>
                <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn-save" onClick={()=>{setVencimientos(vencimientos.map(x=>x.id===v.id?{...x,...editVals,monto:parseFloat(editVals.monto)}:x));setEditId(null);}}>Guardar</button><button className="btn-cancel" onClick={()=>setEditId(null)}>Cancelar</button></div>
              </FormBox>
            ) : (
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={v.pagado} onClick={()=>setVencimientos(vencimientos.map(x=>x.id===v.id?{...x,pagado:!x.pagado}:x))} />
                  <div style={{opacity:v.pagado?0.4:1}}>
                    <div style={{fontWeight:500}}>{v.nombre} <Badge text={diasHasta(v.fecha)} color={v.tipo==='ingreso'?'success':'danger'} /></div>
                    <div style={{fontSize:11,color:'#a8a29e'}}>{fmtDate(v.fecha)}</div>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="row-val" style={{color:v.tipo==='ingreso'?'#3B6D11':'#A32D2D'}}>{v.tipo==='ingreso'?'+':''}{fmt(v.monto)}</span>
                  <button className="btn-icon" onClick={()=>{setEditId(v.id);setEditVals({nombre:v.nombre,fecha:v.fecha,monto:v.monto});}}>✏️</button>
                  <button className="btn-icon" onClick={()=>setVencimientos(vencimientos.filter(x=>x.id!==v.id))}>🗑</button>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- GASTOS SEMANALES ----
function GastosSemanales({gastosSem, setGastosSem, gastosSemPagados, setGastosSemPagados}) {
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});
  const [newG, setNewG] = useState({desc:'',monto:''});
  const viernesActual = getViernesActual();
  const totalPresup = gastosSem.reduce((a,b)=>a+b.monto,0);
  const totalPagado = gastosSemPagados.reduce((a,b)=>a+b.monto,0);
  const pct = totalPresup>0?Math.min(100,Math.round(totalPagado/totalPresup*100)):0;
  const barColor = pct>=100?'#A32D2D':pct>=80?'#854F0B':'#3B6D11';
  return (
    <div>
      <div className="card">
        <div className="card-title">Semana del 26/05 · Cobro vie. {fmtDate(viernesActual)}</div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#78716c',marginBottom:4}}>
          <span>Pagado: <strong style={{color:'#854F0B'}}>{fmt(totalPagado)}</strong></span>
          <span>Presupuesto: <strong>{fmt(totalPresup)}</strong></span>
        </div>
        <div className="progress-bg"><div className="progress-bar" style={{width:`${pct}%`,background:barColor}} /></div>
        <div style={{textAlign:'right',fontSize:11,color:'#78716c',marginBottom:12}}>{pct}% · Queda {fmt(Math.max(0,totalPresup-totalPagado))}</div>
        {gastosSem.map(g=>{
          const pagado = !!gastosSemPagados.find(x=>x.refId===g.id);
          return (
            <div key={g.id}>
              {editId===g.id ? (
                <FormBox>
                  <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                    <input style={{flex:1,minWidth:100,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.desc||''} onChange={e=>setEditVals({...editVals,desc:e.target.value})} />
                    <input type="number" style={{width:120,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.monto||''} onChange={e=>setEditVals({...editVals,monto:e.target.value})} />
                    <button className="btn-save" onClick={()=>{setGastosSem(gastosSem.map(x=>x.id===g.id?{...x,desc:editVals.desc,monto:parseFloat(editVals.monto)}:x));setEditId(null);}}>Guardar</button>
                    <button className="btn-cancel" onClick={()=>setEditId(null)}>Cancelar</button>
                  </div>
                </FormBox>
              ) : (
                <div className="row">
                  <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                    <Tilde checked={pagado} onClick={()=>{const e=gastosSemPagados.find(x=>x.refId===g.id);if(e)setGastosSemPagados(gastosSemPagados.filter(x=>x.refId!==g.id));else setGastosSemPagados([...gastosSemPagados,{id:Date.now(),refId:g.id,desc:g.desc,monto:g.monto,fecha:today}]);}} />
                    <span style={{textDecoration:pagado?'line-through':'none',color:pagado?'#d6d3d1':'#57534e'}}>{g.desc}</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:4}}>
                    <span className="row-val" style={{color:pagado?'#d6d3d1':'#57534e'}}>{fmt(g.monto)}</span>
                    <button className="btn-icon" onClick={()=>{setEditId(g.id);setEditVals({desc:g.desc,monto:g.monto});}}>✏️</button>
                    <button className="btn-icon" onClick={()=>setGastosSem(gastosSem.filter(x=>x.id!==g.id))}>🗑</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div className="card">
        <div className="card-title">Agregar gasto semanal <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd && (
          <FormBox>
            <FormRow label="Descripción"><input value={newG.desc} onChange={e=>setNewG({...newG,desc:e.target.value})} placeholder="Ej: Cancha" /></FormRow>
            <FormRow label="Monto est."><input type="number" value={newG.monto} onChange={e=>setNewG({...newG,monto:e.target.value})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn-save" onClick={()=>{if(!newG.desc)return;setGastosSem([...gastosSem,{id:Date.now(),desc:newG.desc,monto:parseFloat(newG.monto)||0}]);setNewG({desc:'',monto:''});setShowAdd(false);}}>Guardar</button><button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button></div>
          </FormBox>
        )}
        {!showAdd && <div style={{fontSize:12,color:'#a8a29e'}}>Tus gastos semanales recurrentes. Marcalos como pagados cada semana.</div>}
      </div>
    </div>
  );
}

// ---- VARIABLES ----
function Variables({gastosVariables, setGastosVariables, categorias, setCategorias, gastosSem, cuentas, setCuentas, naranja, setNaranja, bbva, setBbva}) {
  const [showAdd, setShowAdd] = useState(false);
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});
  const [newV, setNewV] = useState({desc:'', cat:categorias[0]||'Otro', monto:'', fecha:today, cuenta:'BBVA'});
  const [filtroCat, setFiltroCat] = useState('todas');
  const [filtroEstado, setFiltroEstado] = useState('todos');
  const [filtroDesde, setFiltroDesde] = useState('');
  const [filtroHasta, setFiltroHasta] = useState('');
  const [showFiltros, setShowFiltros] = useState(false);
  const excluidos = (gastosSem||[]).map(g=>g.desc.toLowerCase());
  const esExcluido = desc => excluidos.some(e=>desc.toLowerCase().includes(e));
  const gastosFiltrados = gastosVariables.filter(g => {
    if(filtroCat!=='todas' && g.cat!==filtroCat) return false;
    if(filtroEstado==='pagado' && !g.pagado) return false;
    if(filtroEstado==='pendiente' && g.pagado) return false;
    if(filtroDesde && g.fecha < filtroDesde) return false;
    if(filtroHasta && g.fecha > filtroHasta) return false;
    return true;
  });
  const total = gastosVariables.reduce((a,b)=>a+b.monto,0);
  const totalFiltrado = gastosFiltrados.reduce((a,b)=>a+b.monto,0);
  const hayFiltros = filtroCat!=='todas'||filtroEstado!=='todos'||filtroDesde||filtroHasta;

  return (
    <div>
      <div className="card">
        <div className="card-title">Registrar gasto <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd && (
          <FormBox>
            <FormRow label="Descripción"><input value={newV.desc} onChange={e=>setNewV({...newV,desc:e.target.value})} placeholder="Ej: Cena" /></FormRow>
            <FormRow label="Categoría">
              <select value={newV.cat} onChange={e=>setNewV({...newV,cat:e.target.value})}>
                {categorias.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </FormRow>
            <FormRow label="Monto"><input type="number" value={newV.monto} onChange={e=>setNewV({...newV,monto:e.target.value})} /></FormRow>
            <FormRow label="Fecha"><input type="date" value={newV.fecha} onChange={e=>setNewV({...newV,fecha:e.target.value})} /></FormRow>
            <FormRow label="Cuenta"><select value={newV.cuenta||'BBVA'} onChange={e=>setNewV({...newV,cuenta:e.target.value,tarjeta:'naranja',pago:'1',cuotas:'3'})}>
              {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
              <option value="Efectivo">💵 Efectivo</option>
              <option value="Tarjeta">💳 Tarjeta</option>
            </select></FormRow>
            {newV.cuenta==='Tarjeta' && (
              <div>
                <FormRow label="Tarjeta"><select value={newV.tarjeta||'naranja'} onChange={e=>setNewV({...newV,tarjeta:e.target.value})}>
                  <option value="naranja">Naranja X</option>
                  <option value="bbva">BBVA Visa</option>
                </select></FormRow>
                <FormRow label="Forma"><select value={newV.pago||'1'} onChange={e=>setNewV({...newV,pago:e.target.value})}>
                  <option value="1">Un pago</option>
                  <option value="z">Cuotas sin interés</option>
                </select></FormRow>
                {newV.pago==='z' && <FormRow label="Cuotas"><select value={newV.cuotas||'3'} onChange={e=>setNewV({...newV,cuotas:e.target.value})}>
                  <option value="2">2</option><option value="3">3</option><option value="6">6</option><option value="12">12</option>
                </select></FormRow>}
                {newV.pago==='z' && newV.monto && <div className="alert alert-info" style={{marginBottom:8,fontSize:12}}>1ra cuota: <strong>{fmt(Math.round(parseFloat(newV.monto)/parseInt(newV.cuotas||3)))}</strong></div>}
                {newV.fecha>(newV.tarjeta==='naranja'?naranja.cierre:bbva.cierre) && <div className="alert alert-warning" style={{marginBottom:8,fontSize:12}}>📅 Fecha posterior al cierre → próximo resumen</div>}
              </div>
            )}
            {newV.desc && esExcluido(newV.desc) && <div className="alert alert-warning" style={{marginBottom:8,fontSize:12}}>⚠️ Este gasto está en Semanales.</div>}
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{
                if(!newV.desc||!newV.monto||esExcluido(newV.desc)) return;
                const monto = parseFloat(newV.monto);
                if(newV.cuenta==='Tarjeta') {
                  const esCuotas = newV.pago==='z';
                  const cuotas = esCuotas ? parseInt(newV.cuotas||3) : 1;
                  const montoCuota = esCuotas ? Math.round(monto/cuotas) : monto;
                  const tarjetaObj = newV.tarjeta==='naranja' ? naranja : bbva;
                  const setTarjetaFn = newV.tarjeta==='naranja' ? setNaranja : setBbva;
                  const esProximo = newV.fecha > tarjetaObj.cierre;
                  const nuevoConsumo = {id:Date.now(),desc:newV.desc,cat:newV.cat,montoTotal:monto,montoCuota,cuotas,esCuotas,fecha:newV.fecha,esProximo};
                  setTarjetaFn({...tarjetaObj, consumosNuevos:[...tarjetaObj.consumosNuevos, nuevoConsumo]});
                  if(!esProximo) setGastosVariables([{id:Date.now()+1,desc:newV.desc+' ('+(newV.tarjeta==='naranja'?'Naranja X':'BBVA')+')',cat:newV.cat,monto:montoCuota,fecha:newV.fecha,cuenta:'Tarjeta',pagado:false},...gastosVariables]);
                } else {
                  setGastosVariables([{id:Date.now(),desc:newV.desc,cat:newV.cat,monto,fecha:newV.fecha,cuenta:newV.cuenta||'BBVA',pagado:false},...gastosVariables]);
                }
                setNewV({desc:'',cat:categorias[0]||'Otro',monto:'',fecha:today,cuenta:'BBVA'});
                setShowAdd(false);
              }}>Guardar</button>
              <button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}
        <div style={{marginBottom:12}}>
          <button className="btn-add" onClick={()=>setShowFiltros(!showFiltros)} style={{marginBottom:8}}>
            🔍 Filtros {hayFiltros?<span style={{color:'#185FA5',fontWeight:700}}>●</span>:''}
          </button>
          {showFiltros && (
            <div style={{background:'#F7F6F3',borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                <select style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}>
                  <option value="todas">Todas las categorías</option>
                  {categorias.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
                <select style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)}>
                  <option value="todos">Todos</option>
                  <option value="pagado">Pagados</option>
                  <option value="pendiente">Pendientes</option>
                </select>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{fontSize:12,color:'#78716c'}}>Desde:</span>
                <input type="date" style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroDesde} onChange={e=>setFiltroDesde(e.target.value)} />
                <span style={{fontSize:12,color:'#78716c'}}>Hasta:</span>
                <input type="date" style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroHasta} onChange={e=>setFiltroHasta(e.target.value)} />
                {hayFiltros && <button style={{fontSize:12,color:'#A32D2D',background:'none',border:'none',cursor:'pointer'}} onClick={()=>{setFiltroCat('todas');setFiltroEstado('todos');setFiltroDesde('');setFiltroHasta('');}}>✕ Limpiar</button>}
              </div>
            </div>
          )}
          {hayFiltros && <div style={{fontSize:12,color:'#78716c',marginBottom:4}}>{gastosFiltrados.length} gasto{gastosFiltrados.length!==1?'s':''} · {fmt(totalFiltrado)}</div>}
        </div>
        {gastosFiltrados.length===0 && <div style={{fontSize:13,color:'#a8a29e',padding:'8px 0'}}>Sin gastos para los filtros seleccionados.</div>}
        {gastosFiltrados.map(g=>(
          <div key={g.id}>
            {editId===g.id ? (
              <FormBox>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                  <input style={{flex:1,minWidth:100,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.desc||''} onChange={e=>setEditVals({...editVals,desc:e.target.value})} />
                  <input type="number" style={{width:110,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.monto||''} onChange={e=>setEditVals({...editVals,monto:e.target.value})} />
                  <button className="btn-save" onClick={()=>{setGastosVariables(gastosVariables.map(x=>x.id===g.id?{...x,desc:editVals.desc,monto:parseFloat(editVals.monto)}:x));setEditId(null);}}>✓</button>
                  <button className="btn-cancel" onClick={()=>setEditId(null)}>✕</button>
                </div>
              </FormBox>
            ) : (
              <div className="row">
                <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
                  <Tilde checked={!!g.pagado} onClick={()=>{
                    const updated = gastosVariables.map(x=>x.id===g.id?{...x,pagado:!x.pagado}:x);
                    setGastosVariables(updated);
                    if(g.cuenta && g.cuenta !== 'Tarjeta') {
                      const delta = g.pagado ? g.monto : -g.monto;
                      setCuentas(cuentas.map(c=>c.nombre===g.cuenta?{...c,saldo:c.saldo+delta,movimientos:[{id:Date.now(),desc:g.desc,monto:g.monto,tipo:'egreso',fecha:g.fecha},...(c.movimientos||[])]}:c));
                    }
                  }} />
                  <div style={{opacity:g.pagado?0.5:1}}>
                    <span style={{textDecoration:g.pagado?'line-through':'none'}}><Badge text={g.cat} color="warning" /> {g.desc}</span>
                    <br/><span style={{fontSize:11,color:'#a8a29e'}}>{g.fecha} · </span>
                    <select style={{fontSize:11,border:'none',background:'transparent',color:'#854F0B',cursor:'pointer'}} value={g.cuenta||'BBVA'} onChange={e=>setGastosVariables(gastosVariables.map(x=>x.id===g.id?{...x,cuenta:e.target.value}:x))}>
                      {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.nombre}</option>)}
                      <option value="Efectivo">Efectivo</option>
                      <option value="Tarjeta">Tarjeta</option>
                    </select>
                  </div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:4}}>
                  <span className="row-val" style={{color:g.pagado?'#a8a29e':'#854F0B'}}>{fmt(g.monto)}</span>
                  <button className="btn-icon" onClick={()=>{setEditId(g.id);setEditVals({desc:g.desc,monto:g.monto});}}>✏️</button>
                  <button className="btn-icon" onClick={()=>setGastosVariables(gastosVariables.filter(x=>x.id!==g.id))}>🗑</button>
                </div>
              </div>
            )}
          </div>
        ))}
        <div className="total-row"><span style={{fontWeight:600}}>Total</span><span style={{fontWeight:700,color:'#854F0B',fontSize:15}}>{fmt(total)}</span></div>
      </div>
    </div>
  );
}

function Ingresos({ingresosExtra, setIngresosExtra, tiposIngreso, cuentas, setCuentas}) {

  const [editVals, setEditVals] = useState({});

  const filtrados = filtro==='todos' ? ingresosExtra : ingresosExtra.filter(x=>x.tipo===filtro);

  const totalShows = ingresosExtra.filter(x=>x.tipo==='show').reduce((a,b)=>a+b.monto,0);
  const totalTrabajos = ingresosExtra.filter(x=>x.tipo==='trabajo').reduce((a,b)=>a+b.monto,0);

  return (

        <div className="metric"><div className="metric-label">Sueldos</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>{fmt(totalSueldos)}</div></div>
        <div className="metric"><div className="metric-label">Shows</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>{fmt(totalShows)}</div></div>
        <div className="metric"><div className="metric-label">Trabajos</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>{fmt(totalTrabajos)}</div></div>
      </div>

      <div className="card">
        <div className="card-title">Registrar ingreso <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd && (
          <FormBox>
            <FormRow label="Tipo">
              <select value={newI.tipo} onChange={e=>setNewI({...newI,tipo:e.target.value})}>

              </select>
            </FormRow>
            <FormRow label="Descripción"><input value={newI.desc} onChange={e=>setNewI({...newI,desc:e.target.value})} placeholder="Ej: Sueldo semana 1" /></FormRow>
            <FormRow label="Monto"><input type="number" value={newI.monto} onChange={e=>setNewI({...newI,monto:e.target.value})} /></FormRow>
            <FormRow label="Fecha"><input type="date" value={newI.fecha} onChange={e=>setNewI({...newI,fecha:e.target.value})} /></FormRow>
            <FormRow label="Cuenta"><select value={newI.cuenta||'BBVA'} onChange={e=>setNewI({...newI,cuenta:e.target.value})}>
              {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}

            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{

                setIngresosExtra([{id:Date.now(),desc:newI.desc||newI.tipo,tipo:newI.tipo,monto:parseFloat(newI.monto),fecha:newI.fecha,cobrado:false,cuenta:newI.cuenta||'BBVA'},...ingresosExtra]);
                setNewI({desc:'',tipo:'sueldo',monto:'',fecha:today});
                setShowAdd(false);
              }}>Guardar</button>
              <button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}

        <div className="tab-pills" style={{marginTop:12}}>
          {['todos','sueldo','show','trabajo'].map(f=>(
            <button key={f} className={`tab-pill ${filtro===f?'active':''}`} onClick={()=>setFiltro(f)}>

                  <input type="number" style={{width:120,fontSize:13,padding:'6px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={editVals.monto||''} onChange={e=>setEditVals({...editVals,monto:e.target.value})} />
                  <button className="btn-save" onClick={()=>{setIngresosExtra(ingresosExtra.map(x=>x.id===g.id?{...x,desc:editVals.desc,monto:parseFloat(editVals.monto)}:x));setEditId(null);}}>Guardar</button>
                  <button className="btn-cancel" onClick={()=>setEditId(null)}>Cancelar</button>

              <div className="row">

                    setCuentas(cuentas.map(c=>c.nombre===cuenta?{...c,saldo:c.saldo+delta,movimientos:[{id:Date.now(),desc:g.desc,monto:g.monto,tipo:'ingreso',fecha:g.fecha},...(c.movimientos||[])]}:c));
                  }} />

                    <select style={{fontSize:11,border:'none',background:'transparent',color:'#185FA5',cursor:'pointer'}} value={g.cuenta||'BBVA'} onChange={e=>setIngresosExtra(ingresosExtra.map(x=>x.id===g.id?{...x,cuenta:e.target.value}:x))}>

                  <button className="btn-icon" onClick={()=>{setEditId(g.id);setEditVals({desc:g.desc,monto:g.monto});}}>✏️</button>

      </div>

function Proyeccion({gastosFijos, vencFijos, naranja, bbva, saldoBase, cuentas, ingresosExtra, sueldosCobrados, vencimientos, gastosSemPagados, gastosVariables}) {
  const totalNaranjaVencActual = naranja.historial&&naranja.historial.length>0 ? (naranja.historial[naranja.historial.length-1].total||naranja.historial[naranja.historial.length-1].saldoBase) : 0;
  const totalBBVAVencActual = bbva.historial&&bbva.historial.length>0 ? (bbva.historial[bbva.historial.length-1].total||bbva.historial[bbva.historial.length-1].saldoBase) : 0;
  const totalNaranjaProximo = naranja.saldoBase + naranja.consumosBase.reduce((a,b)=>a+b.monto,0) + naranja.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);
  const totalBBVAProximo = bbva.saldoBase + bbva.consumosBase.reduce((a,b)=>a+b.monto,0) + bbva.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0);
  const totalNaranja = totalNaranjaVencActual||totalNaranjaProximo;
  const totalBBVA = totalBBVAVencActual||totalBBVAProximo;

  const semanas = Array.from({length:12},(_,i)=>{
    const l = getLunes(i); return {lunes:l, domingo:getDomingo(l), viernes:getViernes(l)};
  });

  const getVencSemana = (lunes, domingo) => {
    const items = [];

    ['2026-06-10','2026-07-10','2026-08-10','2026-09-10'].forEach(f=>{if(inRange(f,lunes,domingo))items.push({desc:'Naranja X',monto:f==='2026-06-10'?totalNaranjaVencActual||totalNaranja:totalNaranjaProximo,tipo:'gasto',alert:true});});
    ['2026-06-03','2026-07-03','2026-08-03'].forEach(f=>{if(inRange(f,lunes,domingo))items.push({desc:'BBVA',monto:f==='2026-06-03'?totalBBVAVencActual||totalBBVA:totalBBVAProximo,tipo:'gasto',alert:true});});
    return items;
  };

  return (
    <div>
      <div className="alert alert-info" style={{marginBottom:12}}>Proyección 12 semanas desde 01/06. Cargá ingresos y gastos con fecha para que aparezcan acá.</div>
      <div className="proj-wrap">
        <table className="proj-table">
          <thead>
            <tr>
              <td className="sticky-col-header">Concepto</td>
              {semanas.map((sem,i)=>{
                const v=getVencSemana(sem.lunes,sem.domingo);
                const alert=v.some(x=>x.alert);
                const hoy=new Date(); hoy.setHours(0,0,0,0);
                const esPasada=new Date(sem.domingo+'T12:00:00')<hoy;
                return <td key={i} style={{textAlign:'center',color:alert?'#A32D2D':esPasada?'#a8a29e':'#57534e',background:esPasada?'#F7F6F3':'transparent'}}>
                  {fmtDateShort(sem.lunes)}<br/><span style={{fontSize:10,fontWeight:400,color:'#a8a29e'}}>al {fmtDateShort(sem.domingo)}</span>{alert&&<><br/>🔴</>}
                </td>;
              })}
            </tr>
          </thead>
          <tbody>
            <tr>
              <td className="sticky-col" style={{background:'white',color:'#3B6D11',fontSize:11}}>💰 Ingresos</td>
              {semanas.map((sem,i)=>{
                const ings=ingresosExtra.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo));
                const total=ings.reduce((a,b)=>a+b.monto,0);
                const hoy=new Date(); hoy.setHours(0,0,0,0);
                const esPasada=new Date(sem.domingo+'T12:00:00')<hoy;
                return <td key={i} style={{textAlign:'center',color:total>0?'#3B6D11':'#d6d3d1',fontWeight:total>0?600:400,background:esPasada?'#F7F6F3':'transparent'}}>
                  {total>0?<span>+{fmt(total)}<br/><span style={{fontSize:10,color:'#a8a29e'}}>{ings.length} ingreso{ings.length>1?'s':''}</span></span>:'—'}
                </td>;
              })}
            </tr>
            <tr style={{background:'#FFF7ED'}}>
              <td className="sticky-col" style={{background:'#FFF7ED',color:'#854F0B',fontSize:11}}>➖ Gastos</td>
              {semanas.map((sem,i)=>{
                const vars=gastosVariables.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo));
                const total=vars.reduce((a,b)=>a+b.monto,0);
                const hoy=new Date(); hoy.setHours(0,0,0,0);
                const esPasada=new Date(sem.domingo+'T12:00:00')<hoy;
                return <td key={i} style={{textAlign:'center',color:total>0?'#854F0B':'#d6d3d1',fontWeight:total>0?600:400,background:esPasada&&total>0?'#FAEEDA':'#FFF7ED'}}>
                  {total>0?<span>-{fmt(total)}<br/><span style={{fontSize:10,color:'#a8a29e'}}>{vars.length} gasto{vars.length>1?'s':''}</span></span>:'—'}
                </td>;
              })}
            </tr>

            <tr>
              <td className="sticky-col" style={{background:'white',color:'#A32D2D',fontWeight:600,fontSize:11}}>💳 Naranja X</td>
              {semanas.map((sem,i)=>{
                const f=['2026-06-10','2026-07-10','2026-08-10','2026-09-10'].find(f=>inRange(f,sem.lunes,sem.domingo));
                const monto=f==='2026-06-10'?totalNaranjaVencActual||totalNaranja:totalNaranjaProximo;
                return <td key={i} style={{textAlign:'center',color:f?'#A32D2D':'#d6d3d1',fontWeight:f?600:400}}>
                  {f?<span>-{fmt(monto)}<br/><span style={{fontSize:10,color:'#854F0B'}}>vence {fmtDateShort(f)}</span></span>:'—'}
                </td>;
              })}
            </tr>
            <tr style={{background:'#FAFAF9'}}>
              <td className="sticky-col" style={{background:'#FAFAF9',color:'#A32D2D',fontWeight:600,fontSize:11}}>💳 BBVA</td>
              {semanas.map((sem,i)=>{
                const f=['2026-06-03','2026-07-03','2026-08-03'].find(f=>inRange(f,sem.lunes,sem.domingo));
                const monto=f==='2026-06-03'?totalBBVAVencActual||totalBBVA:totalBBVAProximo;
                return <td key={i} style={{textAlign:'center',color:f?'#A32D2D':'#d6d3d1',fontWeight:f?600:400,background:'#FAFAF9'}}>
                  {f?<span>-{fmt(monto)}<br/><span style={{fontSize:10,color:'#854F0B'}}>vence {fmtDateShort(f)}</span></span>:'—'}
                </td>;
              })}
            </tr>
            <tr style={{borderTop:'2px solid #44403c',background:'#F0EEE8'}}>
              <td className="sticky-col" style={{background:'#F0EEE8',fontWeight:700}}>Balance sem.</td>
              {semanas.map((sem,i)=>{
                const v=getVencSemana(sem.lunes,sem.domingo);
                const tv=v.filter(x=>x.tipo==='gasto').reduce((a,b)=>a+b.monto,0);
                const ie=ingresosExtra.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                const gv=gastosVariables.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                const d=ie-tv-gv;
                return <td key={i} style={{textAlign:'center',color:d>=0?'#3B6D11':'#A32D2D',fontWeight:700,background:'#F0EEE8'}}>{d>=0?'+':''}{fmt(d)}</td>;
              })}
            </tr>
            <tr style={{background:'#EAF3DE'}}>
              <td className="sticky-col" style={{background:'#EAF3DE',fontWeight:700,fontSize:12}}>📊 Proyectado</td>
              {(()=>{
                const bbvaAcc=cuentas.find(c=>c.nombre==='BBVA'); let r=bbvaAcc?bbvaAcc.saldo:0;
                return semanas.map((sem,i)=>{
                  const v=getVencSemana(sem.lunes,sem.domingo);
                  const tv=v.filter(x=>x.tipo==='gasto').reduce((a,b)=>a+b.monto,0);
                  const ie=ingresosExtra.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                  const gv=gastosVariables.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                  r+=ie-tv-gv;
                  const c=r<0?'#A32D2D':r<200000?'#854F0B':'#185FA5';
                  return <td key={i} style={{textAlign:'center',color:c,fontWeight:700,background:r<0?'#FCEBEB':'#EAF3DE'}}>{fmt(r)}</td>;
                });
              })()}
            </tr>
            <tr style={{background:'#E6F1FB'}}>
              <td className="sticky-col" style={{background:'#E6F1FB',fontWeight:700,fontSize:12}}>✅ Real</td>
              {(()=>{
                const bbvaReal=cuentas.find(c=>c.nombre==='BBVA'); let r=bbvaReal?bbvaReal.saldo:0;
                return semanas.map((sem,i)=>{
                  const tv=vencimientos.filter(x=>x.pagado&&x.tipo==='gasto'&&inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                  const tvFijos=0;
                  const ic=ingresosExtra.filter(x=>x.cobrado&&inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                  const gsp=gastosSemPagados.filter(x=>inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                  const gvp=gastosVariables.filter(x=>x.pagado&&inRange(x.fecha,sem.lunes,sem.domingo)).reduce((a,b)=>a+b.monto,0);
                  r+=ic-gsp-tv-tvFijos-gvp;
                  const c=r<0?'#A32D2D':r<200000?'#854F0B':'#185FA5';
                  return <td key={i} style={{textAlign:'center',color:c,fontWeight:700,background:r<0?'#FCEBEB':'#E6F1FB'}}>{fmt(r)}</td>;
                });
              })()}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Cuentas({cuentas, setCuentas}) {
  const [editId, setEditId] = useState(null);
  const [editVals, setEditVals] = useState({});
  const [showAdd, setShowAdd] = useState(false);
  const [newC, setNewC] = useState({nombre:'', saldo:'', icono:'💰'});
  const [showMovId, setShowMovId] = useState(null);
  const [newMov, setNewMov] = useState({desc:'', monto:'', tipo:'egreso'});

  const agregarMovimiento = (id) => {
    if(!newMov.desc || !newMov.monto) return;
    const monto = parseFloat(newMov.monto);
    setCuentas(cuentas.map(c => c.id===id ? {
      ...c,
      saldo: newMov.tipo==='ingreso' ? c.saldo+monto : c.saldo-monto,
      movimientos: [{id:Date.now(), desc:newMov.desc, monto, tipo:newMov.tipo, fecha:today}, ...(c.movimientos||[])]
    } : c));
    setNewMov({desc:'', monto:'', tipo:'egreso'});
    setShowMovId(null);
  };

  const [showTransfer, setShowTransfer] = useState(false);
  const [transfer, setTransfer] = useState({origen:'', destino:'', monto:'', desc:'Transferencia'});

  const hacerTransferencia = () => {
    if(!transfer.origen||!transfer.destino||!transfer.monto||transfer.origen===transfer.destino) return;
    const monto = parseFloat(transfer.monto);
    const now = Date.now();
    setCuentas(cuentas.map(c=>{
      if(c.nombre===transfer.origen) return {...c, saldo:c.saldo-monto, movimientos:[{id:now,desc:`${transfer.desc} → ${transfer.destino}`,monto,tipo:'egreso',fecha:today},...(c.movimientos||[])]};
      if(c.nombre===transfer.destino) return {...c, saldo:c.saldo+monto, movimientos:[{id:now+1,desc:`${transfer.desc} ← ${transfer.origen}`,monto,tipo:'ingreso',fecha:today},...(c.movimientos||[])]};
      return c;
    }));
    setTransfer({origen:'',destino:'',monto:'',desc:'Transferencia'});
    setShowTransfer(false);
  };

  const todasCuentas = [...cuentas, {id:'ef', nombre:'Efectivo', icono:'💵', saldo:0}];

  return (
    <div>
      <div className="card">
        <div className="card-title">Transferir entre cuentas</div>
        {!showTransfer ? (
          <button className="btn-save" style={{width:'100%'}} onClick={()=>setShowTransfer(true)}>↔ Registrar transferencia</button>
        ) : (
          <FormBox>
            <FormRow label="Origen"><select value={transfer.origen} onChange={e=>setTransfer({...transfer,origen:e.target.value})}>
              <option value="">Seleccioná...</option>
              {todasCuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
            </select></FormRow>
            <FormRow label="Destino"><select value={transfer.destino} onChange={e=>setTransfer({...transfer,destino:e.target.value})}>
              <option value="">Seleccioná...</option>
              {todasCuentas.filter(c=>c.nombre!==transfer.origen).map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
            </select></FormRow>
            <FormRow label="Monto"><input type="number" value={transfer.monto} onChange={e=>setTransfer({...transfer,monto:e.target.value})} placeholder="0" /></FormRow>
            <FormRow label="Descripción"><input value={transfer.desc} onChange={e=>setTransfer({...transfer,desc:e.target.value})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={hacerTransferencia}>Confirmar</button>
              <button className="btn-cancel" onClick={()=>setShowTransfer(false)}>Cancelar</button>
            </div>
          </FormBox>

}

function Reporte({gastosVariables, ingresosExtra, naranja, bbva, cuentas}) {
  const [filtroCat, setFiltroCat] = useState('todas');
  const [filtroTipo, setFiltroTipo] = useState('todos');
  const [filtroCuenta, setFiltroCuenta] = useState('todas');
  const [filtroEstado, setFiltroEstado] = useState('todos');
  const [filtroDesde, setFiltroDesde] = useState('');
  const [filtroHasta, setFiltroHasta] = useState('');

  // Build all movements
  const movimientos = [
    ...ingresosExtra.map(x=>({...x, _tipo:'ingreso', _label:x.tipo==='sueldo'?'Sueldo':x.tipo==='show'?'Show':'Trabajo', _color:'#3B6D11', _signo:'+'})),
    ...gastosVariables.map(x=>({...x, _tipo:'gasto', _label:x.cat, _color:'#854F0B', _signo:'-'})),
    ...(naranja.pagos||[]).map(x=>({...x, desc:'Pago Naranja X', _tipo:'pago', _label:'Pago tarjeta', _color:'#A32D2D', _signo:'-', cuenta:x.cuenta, cobrado:true, pagado:true})),
    ...(bbva.pagos||[]).map(x=>({...x, desc:'Pago BBVA', _tipo:'pago', _label:'Pago tarjeta', _color:'#A32D2D', _signo:'-', cuenta:x.cuenta, cobrado:true, pagado:true})),
  ].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));

  const categorias = [...new Set(gastosVariables.map(g=>g.cat))];
  const todasCuentas = [...cuentas.map(c=>c.nombre), 'Efectivo', 'Tarjeta'];

  const filtrados = movimientos.filter(m => {
    if(filtroTipo!=='todos') {
      if(['sueldo','show','trabajo'].includes(filtroTipo)) {
        if(m.tipo!==filtroTipo) return false;
      } else {
        if(m._tipo!==filtroTipo) return false;
      }
    }
    if(filtroCat!=='todas' && m._label!==filtroCat) return false;
    if(filtroCuenta!=='todas' && (m.cuenta||'BBVA')!==filtroCuenta) return false;
    if(filtroEstado==='pagado' && !(m.pagado||m.cobrado)) return false;
    if(filtroEstado==='pendiente' && (m.pagado||m.cobrado)) return false;
    if(filtroDesde && m.fecha<filtroDesde) return false;
    if(filtroHasta && m.fecha>filtroHasta) return false;
    return true;
  });

  const totalIngresos = filtrados.filter(m=>m._tipo==='ingreso').reduce((a,b)=>a+b.monto,0);
  const totalEgresos = filtrados.filter(m=>m._tipo!=='ingreso').reduce((a,b)=>a+b.monto,0);
  const hayFiltros = filtroTipo!=='todos'||filtroCat!=='todas'||filtroCuenta!=='todas'||filtroEstado!=='todos'||filtroDesde||filtroHasta;

  return (
    <div>
      <div className="card">
        <div className="card-title">Filtros</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
          <select style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroTipo} onChange={e=>setFiltroTipo(e.target.value)}>
            <option value="todos">Todos los tipos</option>
            <option value="ingreso">Ingresos</option>
            <option value="sueldo">— Sueldos</option>
            <option value="show">— Shows</option>
            <option value="trabajo">— Trabajos</option>
            <option value="gasto">Gastos</option>
            <option value="pago">Pagos tarjeta</option>
          </select>
          <select style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroCuenta} onChange={e=>setFiltroCuenta(e.target.value)}>
            <option value="todas">Todas las cuentas</option>
            {todasCuentas.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <select style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)}>
            <option value="todos">Todos</option>
            <option value="pagado">Efectuados</option>
            <option value="pendiente">Pendientes</option>
          </select>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center',marginBottom:8}}>
          <select style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroCat} onChange={e=>setFiltroCat(e.target.value)}>
            <option value="todas">Todas las categorías</option>
            {categorias.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <span style={{fontSize:12,color:'#78716c'}}>Desde:</span>
          <input type="date" style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroDesde} onChange={e=>setFiltroDesde(e.target.value)} />
          <span style={{fontSize:12,color:'#78716c'}}>Hasta:</span>
          <input type="date" style={{fontSize:12,padding:'4px 8px',border:'1px solid #e7e5e4',borderRadius:6}} value={filtroHasta} onChange={e=>setFiltroHasta(e.target.value)} />
          {hayFiltros && <button style={{fontSize:12,color:'#A32D2D',background:'none',border:'none',cursor:'pointer'}} onClick={()=>{setFiltroTipo('todos');setFiltroCat('todas');setFiltroCuenta('todas');setFiltroEstado('todos');setFiltroDesde('');setFiltroHasta('');}}>✕ Limpiar</button>}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
        <div className="metric"><div className="metric-label">Ingresos</div><div className="metric-value" style={{color:'#3B6D11',fontSize:15}}>+{fmt(totalIngresos)}</div></div>
        <div className="metric"><div className="metric-label">Egresos</div><div className="metric-value" style={{color:'#A32D2D',fontSize:15}}>-{fmt(totalEgresos)}</div></div>
        <div className="metric"><div className="metric-label">Balance</div><div className="metric-value" style={{color:totalIngresos-totalEgresos>=0?'#185FA5':'#A32D2D',fontSize:15}}>{fmt(totalIngresos-totalEgresos)}</div></div>
      </div>

      <div className="card">
        <div className="card-title">{filtrados.length} movimiento{filtrados.length!==1?'s':''}</div>
        {filtrados.length===0 && <div style={{fontSize:13,color:'#a8a29e',padding:'8px 0'}}>Sin movimientos para los filtros seleccionados.</div>}
        {filtrados.map((m,i)=>(
          <div key={m.id||i} className="row">
            <div className="row-label">
              <Badge text={m._label} color={m._tipo==='ingreso'?'success':m._tipo==='pago'?'danger':'warning'} /> {m.desc}
              <br/><span style={{fontSize:11,color:'#a8a29e'}}>{m.fecha}{m.cuenta?' · '+m.cuenta:''}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              {(m.pagado||m.cobrado) ? <span style={{fontSize:11,color:'#3B6D11'}}>✓</span> : <span style={{fontSize:11,color:'#a8a29e'}}>○</span>}
              <span className="row-val" style={{color:m._color}}>{m._signo}{fmt(m.monto)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TarjetaCard({tarjeta, setTarjeta, categorias, gastosVariables, setGastosVariables, cuentas, setCuentas}) {
  const [showAdd, setShowAdd] = useState(false);
  const [showEdit, setShowEdit] = useState(false);
  const [showHistorial, setShowHistorial] = useState(false);
  const [showPago, setShowPago] = useState(false);
  const [pagoVals, setPagoVals] = useState({monto:'', cuenta:'BBVA', fecha:today});
  const [editHeader, setEditHeader] = useState({cierre:tarjeta.cierre,vencimiento:tarjeta.vencimiento,saldoBase:tarjeta.saldoBase});
  const [newC, setNewC] = useState({desc:'',monto:'',fecha:today,pago:'1',cuotas:'3',cat:categorias[0]||'Otro'});

  useEffect(()=>{
    const hoy=new Date(); hoy.setHours(0,0,0,0);
    const cierre=new Date(tarjeta.cierre+'T12:00:00');
    if(hoy>cierre && tarjeta.consumosBase.length>0){
      const proximosCuotas=tarjeta.consumosNuevos.filter(c=>c.esProximo);
      const historialEntry={id:Date.now(),cierre:tarjeta.cierre,vencimiento:tarjeta.vencimiento,saldoBase:tarjeta.saldoBase,consumos:[...tarjeta.consumosBase,...tarjeta.consumosNuevos.filter(c=>!c.esProximo)],total:tarjeta.saldoBase+tarjeta.consumosNuevos.filter(c=>!c.esProximo).reduce((a,b)=>a+b.montoCuota,0)};
      const nextCierre=(()=>{const d=new Date(tarjeta.cierre+'T12:00:00');d.setMonth(d.getMonth()+1);return d.toISOString().split('T')[0];})();
      const nextVenc=(()=>{const d=new Date(tarjeta.vencimiento+'T12:00:00');d.setMonth(d.getMonth()+1);return d.toISOString().split('T')[0];})();
      const cuotasFuturas=tarjeta.consumosNuevos.filter(c=>!c.esProximo&&c.esCuotas&&c.cuotas>1).map(c=>({desc:c.desc+` (cuota 2/${c.cuotas})`,monto:c.montoCuota,fecha:nextCierre,esCuotaFutura:true,cuotasRestantes:c.cuotas-1,montoCuota:c.montoCuota}));
      const cuotasBaseRestantes=(tarjeta.consumosBase||[]).filter(c=>c.esCuotaFutura&&c.cuotasRestantes>1).map(c=>({...c,desc:c.desc.replace(/cuota \d+/,`cuota ${parseInt(c.desc.match(/cuota (\d+)/)?.[1]||1)+1}`),cuotasRestantes:c.cuotasRestantes-1,fecha:nextCierre}));
      const nextConsumosBase=[...proximosCuotas.map(c=>({desc:c.desc+(c.esCuotas?` (cuota 2/${c.cuotas})`:''),monto:c.montoCuota,fecha:c.fecha})),...cuotasFuturas,...cuotasBaseRestantes];
      setTarjeta({...tarjeta,cierre:nextCierre,vencimiento:nextVenc,saldoBase:0,consumosBase:nextConsumosBase,consumosNuevos:[],historial:[...(tarjeta.historial||[]),historialEntry]});
    }
  },[]);

  const actuales=tarjeta.consumosNuevos.filter(c=>!c.esProximo);
  const proximos=tarjeta.consumosNuevos.filter(c=>c.esProximo);
  const totalConsumosBase=tarjeta.consumosBase.reduce((a,b)=>a+b.monto,0);
  const totalNuevosActual=actuales.reduce((a,b)=>a+b.montoCuota,0);
  const totalNuevosProximo=proximos.reduce((a,b)=>a+b.montoCuota,0);
  const saldoTotal=tarjeta.saldoBase+totalConsumosBase+totalNuevosActual;
  const disp=Math.max(0,tarjeta.limite-saldoTotal);
  const pct=Math.min(100,Math.round(saldoTotal/tarjeta.limite*100));
  const barColor=pct>=80?'#A32D2D':pct>=50?'#854F0B':'#3B6D11';

  const addConsumo=()=>{
    if(!newC.desc||!newC.monto) return;
    const monto=parseFloat(newC.monto);
    const esCuotas=newC.pago==='z';
    const cuotas=esCuotas?parseInt(newC.cuotas):1;
    const montoCuota=esCuotas?Math.round(monto/cuotas):monto;
    const esProximo=newC.fecha>tarjeta.cierre;
    setTarjeta({...tarjeta,consumosNuevos:[...tarjeta.consumosNuevos,{id:Date.now(),desc:newC.desc,cat:newC.cat,montoTotal:monto,montoCuota,cuotas,esCuotas,fecha:newC.fecha,esProximo}]});
    if(!esProximo) setGastosVariables([{id:Date.now()+1,desc:newC.desc+' ('+tarjeta.nombre+')',cat:newC.cat,monto:montoCuota,fecha:newC.fecha},...gastosVariables]);
    setNewC({desc:'',monto:'',fecha:today,pago:'1',cuotas:'3',cat:categorias[0]||'Otro'});
    setShowAdd(false);
  };

  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>{tarjeta.nombre}</div>
            <div style={{fontSize:11,color:'#a8a29e',marginTop:2}}>Cierra {fmtDate(tarjeta.cierre)} · Vence {fmtDate(tarjeta.vencimiento)}</div>
            {tarjeta.usd&&<div style={{fontSize:11,color:'#a8a29e'}}>{tarjeta.usd}</div>}
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:22,fontWeight:700,color:'#A32D2D'}}>{fmt(saldoTotal)}</div>
            <div style={{fontSize:11,color:'#a8a29e'}}>Límite: {fmt(tarjeta.limite)}</div>
            <button style={{fontSize:11,color:'#185FA5',background:'none',border:'none',cursor:'pointer',marginTop:2}} onClick={()=>setShowEdit(!showEdit)}>✏️ Editar</button>
          </div>
        </div>
        {showEdit&&(
          <FormBox>
            <FormRow label="Cierre"><input type="date" value={editHeader.cierre} onChange={e=>setEditHeader({...editHeader,cierre:e.target.value})} /></FormRow>
            <FormRow label="Vencimiento"><input type="date" value={editHeader.vencimiento} onChange={e=>setEditHeader({...editHeader,vencimiento:e.target.value})} /></FormRow>
            <FormRow label="Saldo base"><input type="number" value={editHeader.saldoBase} onChange={e=>setEditHeader({...editHeader,saldoBase:parseFloat(e.target.value)||0})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn-save" onClick={()=>{setTarjeta({...tarjeta,...editHeader});setShowEdit(false);}}>Guardar</button><button className="btn-cancel" onClick={()=>setShowEdit(false)}>Cancelar</button></div>
          </FormBox>
        )}
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'#78716c',marginBottom:4,marginTop:8}}>
          <span>Disponible: <strong style={{color:disp<50000?'#854F0B':'#3B6D11'}}>{fmt(disp)}</strong></span>
          <span>Usado: <strong style={{color:barColor}}>{pct}%</strong></span>
        </div>
        <div className="progress-bg"><div className="progress-bar" style={{width:`${pct}%`,background:barColor}} /></div>
      </div>

      <div className="card">
        <div className="card-title">Resumen actual <Badge text={`Cierra ${fmtDate(tarjeta.cierre)}`} color="warning" /></div>
        {tarjeta.consumosBase.map((c,i)=>(
          <div key={i} className="row">
            <div className="row-label">{c.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{fmtDate(c.fecha)}</span></div>
            <span className="row-val" style={{color:c.monto<0?'#3B6D11':'#A32D2D'}}>{c.monto<0?'+':''}{fmt(Math.abs(c.monto))}</span>
          </div>
        ))}
        {actuales.map(c=>(
          <div key={c.id}>
            <div className="row">
              <div className="row-label"><Badge text={c.esCuotas?`${c.cuotas}c`:'nuevo'} color={c.esCuotas?'warning':'new'} /> {c.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{c.esCuotas?`Cuota 1/${c.cuotas}: ${fmt(c.montoCuota)}`:fmtDate(c.fecha)}</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span className="row-val" style={{color:'#185FA5'}}>{fmt(c.montoCuota)}</span>
                <button className="btn-icon" onClick={()=>setTarjeta({...tarjeta,consumosNuevos:tarjeta.consumosNuevos.filter(x=>x.id!==c.id)})}>🗑</button>
              </div>
            </div>
          </div>
        ))}
        <div className="total-row"><span style={{fontWeight:600}}>Total resumen actual</span><span style={{fontWeight:700,color:'#A32D2D',fontSize:15}}>{fmt(totalConsumosBase+totalNuevosActual)}</span></div>
      </div>

      {proximos.length>0&&(
        <div className="card">
          <div className="card-title">Próximo resumen <Badge text="posterior al cierre" color="info" /></div>
          {proximos.map(c=>(
            <div key={c.id} className="row">
              <div className="row-label"><Badge text="próximo" color="info" /> {c.desc}<br/><span style={{fontSize:11,color:'#a8a29e'}}>{fmtDate(c.fecha)}</span></div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span className="row-val" style={{color:'#185FA5'}}>{fmt(c.montoCuota)}</span>
                <button className="btn-icon" onClick={()=>setTarjeta({...tarjeta,consumosNuevos:tarjeta.consumosNuevos.filter(x=>x.id!==c.id)})}>🗑</button>
              </div>
            </div>
          ))}
          <div className="total-row"><span style={{fontWeight:600}}>Total próximo resumen</span><span style={{fontWeight:700,color:'#185FA5',fontSize:15}}>{fmt(totalNuevosProximo)}</span></div>
        </div>
      )}

      {(tarjeta.historial||[]).length>0&&(
        <div className="card">
          <div className="card-title" style={{cursor:'pointer'}} onClick={()=>setShowHistorial(!showHistorial)}>
            📋 Historial ({(tarjeta.historial||[]).length}) {showHistorial?'▲':'▼'}
          </div>
          {showHistorial&&(tarjeta.historial||[]).slice().reverse().map(h=>(
            <div key={h.id} style={{marginBottom:14,paddingBottom:14,borderBottom:'1px solid #F5F4F0'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <div><div style={{fontWeight:600,fontSize:13}}>Resumen {fmtDate(h.cierre)}</div><div style={{fontSize:11,color:'#a8a29e'}}>Venció {fmtDate(h.vencimiento)}</div></div>
                <div style={{fontWeight:700,color:'#A32D2D',fontSize:15}}>{fmt(h.total||h.saldoBase)}</div>
              </div>
              {(h.consumos||[]).map((c,i)=>(
                <div key={i} className="row" style={{fontSize:12}}>
                  <span style={{color:'#78716c',flex:1}}>{c.desc}</span>
                  <span style={{fontWeight:600,color:c.monto<0?'#3B6D11':'#A32D2D'}}>{c.monto<0?'+':''}{fmt(Math.abs(c.monto))}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      <div className="card">
        <div className="card-title">Pagar tarjeta</div>
        {!showPago ? (
          <button className="btn-save" style={{width:'100%'}} onClick={()=>setShowPago(true)}>💳 Registrar pago</button>
        ) : (
          <FormBox>
            <div style={{fontSize:13,marginBottom:8}}>Total resumen actual: <strong style={{color:'#A32D2D'}}>{fmt(saldoTotal)}</strong></div>
            <FormRow label="Monto"><input type="number" value={pagoVals.monto} onChange={e=>setPagoVals({...pagoVals,monto:e.target.value})} placeholder={String((() => { const hoy=new Date(); hoy.setHours(0,0,0,0); const vD=new Date(tarjeta.vencimiento+"T12:00:00"); const uH=(tarjeta.historial||[]).length>0?tarjeta.historial[tarjeta.historial.length-1]:null; return uH&&hoy<=vD?(uH.total||uH.saldoBase):saldoTotal; })())} /></FormRow>
            <FormRow label="Cuenta origen"><select value={pagoVals.cuenta} onChange={e=>setPagoVals({...pagoVals,cuenta:e.target.value})}>
              {cuentas.map(c=><option key={c.id} value={c.nombre}>{c.icono} {c.nombre}</option>)}
            </select></FormRow>
            <FormRow label="Fecha"><input type="date" value={pagoVals.fecha} onChange={e=>setPagoVals({...pagoVals,fecha:e.target.value})} /></FormRow>
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button className="btn-save" onClick={()=>{
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const vencD = new Date(tarjeta.vencimiento+'T12:00:00');
                const ultimoH = (tarjeta.historial||[]).length>0 ? tarjeta.historial[tarjeta.historial.length-1] : null;
                const montoDefault = ultimoH && hoy<=vencD ? (ultimoH.total||ultimoH.saldoBase) : saldoTotal;
                const monto = parseFloat(pagoVals.monto)||montoDefault;
                const pagoId = Date.now();
                setCuentas(cuentas.map(c=>c.nombre===pagoVals.cuenta?{
                  ...c,
                  saldo: c.saldo-monto,
                  movimientos: [{id:pagoId,desc:`Pago ${tarjeta.nombre}`,monto,tipo:'egreso',fecha:pagoVals.fecha},...(c.movimientos||[])]
                }:c));
                setTarjeta({...tarjeta, pagos:[{id:pagoId,monto,cuenta:pagoVals.cuenta,fecha:pagoVals.fecha},...(tarjeta.pagos||[])]});
                setShowPago(false);
                setPagoVals({monto:'',cuenta:cuentas[0]?.nombre||'BBVA',fecha:today});
              }}>Confirmar pago</button>
              <button className="btn-cancel" onClick={()=>setShowPago(false)}>Cancelar</button>
            </div>
          </FormBox>
        )}
      </div>

      {(tarjeta.pagos||[]).length > 0 && (
        <div className="card">
          <div className="card-title">Pagos realizados</div>
          {(tarjeta.pagos||[]).map(p=>(
            <div key={p.id} className="row">
              <div className="row-label">
                Pago {tarjeta.nombre}
                <br/><span style={{fontSize:11,color:'#a8a29e'}}>{p.fecha} · desde {p.cuenta}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <span className="row-val" style={{color:'#3B6D11'}}>-{fmt(p.monto)}</span>
                <button className="btn-icon" onClick={()=>{
                  // Revertir saldo de la cuenta
                  setCuentas(cuentas.map(c=>c.nombre===p.cuenta?{
                    ...c,
                    saldo: c.saldo+p.monto,
                    movimientos: (c.movimientos||[]).filter(m=>m.id!==p.id)
                  }:c));
                  // Eliminar pago de tarjeta
                  setTarjeta({...tarjeta, pagos:(tarjeta.pagos||[]).filter(x=>x.id!==p.id)});
                }}>🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="card">
        <div className="card-title">Agregar consumo <BtnAdd onClick={()=>setShowAdd(!showAdd)} /></div>
        {showAdd&&(
          <FormBox>
            <FormRow label="Descripción"><input value={newC.desc} onChange={e=>setNewC({...newC,desc:e.target.value})} placeholder="Ej: Supermercado" /></FormRow>
            <FormRow label="Monto total"><input type="number" value={newC.monto} onChange={e=>setNewC({...newC,monto:e.target.value})} /></FormRow>
            <FormRow label="Fecha"><input type="date" value={newC.fecha} onChange={e=>setNewC({...newC,fecha:e.target.value})} /></FormRow>
            <FormRow label="Categoría"><select value={newC.cat} onChange={e=>setNewC({...newC,cat:e.target.value})}>{categorias.map(c=><option key={c} value={c}>{c}</option>)}</select></FormRow>
            <FormRow label="Forma de pago"><select value={newC.pago} onChange={e=>setNewC({...newC,pago:e.target.value})}><option value="1">Un pago</option><option value="z">En cuotas sin interés</option></select></FormRow>
            {newC.pago==='z'&&<FormRow label="Cuotas"><select value={newC.cuotas} onChange={e=>setNewC({...newC,cuotas:e.target.value})}><option value="2">2</option><option value="3">3</option><option value="6">6</option><option value="12">12</option></select></FormRow>}
            {newC.pago==='z'&&newC.monto&&<div className="alert alert-info" style={{marginBottom:8,fontSize:12}}>1ra cuota: <strong>{fmt(Math.round(parseFloat(newC.monto)/parseInt(newC.cuotas)))}</strong></div>}
            {newC.fecha>tarjeta.cierre&&<div className="alert alert-warning" style={{marginBottom:8,fontSize:12}}>📅 Fecha posterior al cierre → próximo resumen</div>}
            <div style={{display:'flex',gap:8,marginTop:8}}><button className="btn-save" onClick={addConsumo}>Guardar</button><button className="btn-cancel" onClick={()=>setShowAdd(false)}>Cancelar</button></div>
          </FormBox>
        )}
        {!showAdd&&<div style={{fontSize:12,color:'#a8a29e'}}>Los consumos posteriores al cierre van al próximo resumen automáticamente.</div>}
      </div>
    </div>
  );
}

function Tarjetas({naranja, setNaranja, bbva, setBbva, categorias, gastosVariables, setGastosVariables, cuentas, setCuentas}) {
  const [tab, setTab] = useState('naranja');
  return (
    <div>
      <div className="tab-pills">
        <button className={`tab-pill ${tab==='naranja'?'active':''}`} onClick={()=>setTab('naranja')}>Naranja X</button>
        <button className={`tab-pill ${tab==='bbva'?'active':''}`} onClick={()=>setTab('bbva')}>BBVA Visa</button>
      </div>
      {tab==='naranja' && <TarjetaCard tarjeta={naranja} setTarjeta={setNaranja} categorias={categorias} gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} cuentas={cuentas} setCuentas={setCuentas} />}
      {tab==='bbva' && <TarjetaCard tarjeta={bbva} setTarjeta={setBbva} categorias={categorias} gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} cuentas={cuentas} setCuentas={setCuentas} />}
    </div>
  );
}

// ---- APP ----
const TABS = [
  {id:'dashboard', label:'Inicio', icon:'🏠'},
  {id:'variables', label:'Gastos', icon:'➖'},
  {id:'ingresos', label:'Ingresos', icon:'💰'},
  {id:'proyeccion', label:'Proy.', icon:'📊'},
  {id:'cuentas', label:'Cuentas', icon:'🏦'},
  {id:'tarjetas', label:'Tarjetas', icon:'💳'},
  {id:'reporte', label:'Reporte', icon:'📋'},
  {id:'config', label:'Config.', icon:'⚙️'},
];

function App() {
  const [tab, setTab] = useState('dashboard');
  const [saldoBase, setSaldoBase] = useState(442000);
  const [gastosFijos, setGastosFijos] = useState(GASTOS_FIJOS_INIT);
  const [gastosSem, setGastosSem] = useState(GASTOS_SEM_INIT);
  const [gastosSemPagados, setGastosSemPagados] = useState([]);
  const [vencimientos, setVencimientos] = useState(VENC_INIT);
  const [vencFijos, setVencFijos] = useState(VENC_FIJOS_INIT);
  const [gastosVariables, setGastosVariables] = useState([]);
  const [ingresosExtra, setIngresosExtra] = useState(INGRESOS_INIT);
  const [sueldosCobrados, setSueldosCobrados] = useState([]);
  const [presupuestoVar, setPresupuestoVar] = useState(300000);
  const [categorias, setCategorias] = useState(CATS_INIT);
  const [tiposIngreso, setTiposIngreso] = useState(['Sueldo','Show','Trabajo particular']);
  const [cuentas, setCuentas] = useState(CUENTAS_INIT);
  const [naranja, setNaranja] = useState(NARANJA_INIT);
  const [bbva, setBbva] = useState(BBVA_INIT);
  const importRef = useRef();
  const isFirstRender = useRef(true);

  // Load from localStorage on mount
  useEffect(()=>{
    const d = loadFromStorage();
    if(d){
      if(d.saldoBase!==undefined) setSaldoBase(d.saldoBase);
      if(d.gastosFijos) setGastosFijos(d.gastosFijos);
      if(d.gastosSem) setGastosSem(d.gastosSem);
      if(d.gastosSemPagados) setGastosSemPagados(d.gastosSemPagados);
      if(d.vencimientos) setVencimientos(d.vencimientos);
      if(d.vencFijos) setVencFijos(d.vencFijos);
      if(d.gastosVariables) setGastosVariables(d.gastosVariables);
      if(d.ingresosExtra) setIngresosExtra(d.ingresosExtra);
      if(d.sueldosCobrados) setSueldosCobrados(d.sueldosCobrados);
      if(d.presupuestoVar) setPresupuestoVar(d.presupuestoVar);
      if(d.categorias) setCategorias(d.categorias);
      if(d.naranja) setNaranja(d.naranja);
      if(d.bbva) setBbva(d.bbva);
      if(d.cuentas) setCuentas(d.cuentas);
      if(d.tiposIngreso) setTiposIngreso(d.tiposIngreso);
    }
    isFirstRender.current = false;
  },[]);

  // Save to localStorage on every change
  useEffect(()=>{
    if(isFirstRender.current) return;
    const data = {saldoBase,gastosFijos,gastosSem,gastosSemPagados,vencimientos,vencFijos,gastosVariables,ingresosExtra,sueldosCobrados,presupuestoVar,categorias,tiposIngreso,naranja,bbva,cuentas};
    saveToStorage(data);
  },[saldoBase,gastosFijos,gastosSem,gastosSemPagados,vencimientos,vencFijos,gastosVariables,ingresosExtra,sueldosCobrados,presupuestoVar,categorias,tiposIngreso,naranja,bbva,cuentas]);

  const getAllData = () => ({saldoBase,gastosFijos,gastosSem,gastosSemPagados,vencimientos,vencFijos,gastosVariables,ingresosExtra,sueldosCobrados,presupuestoVar,categorias,naranja,bbva});

  const handleImport = (data) => {
    if(data.saldoBase!==undefined) setSaldoBase(data.saldoBase);
    if(data.gastosFijos) setGastosFijos(data.gastosFijos);
    if(data.gastosSem) setGastosSem(data.gastosSem);
    if(data.gastosSemPagados) setGastosSemPagados(data.gastosSemPagados);
    if(data.vencimientos) setVencimientos(data.vencimientos);
    if(data.vencFijos) setVencFijos(data.vencFijos);
    if(data.gastosVariables) setGastosVariables(data.gastosVariables);
    if(data.ingresosExtra) setIngresosExtra(data.ingresosExtra);
    if(data.sueldosCobrados) setSueldosCobrados(data.sueldosCobrados);
    if(data.presupuestoVar) setPresupuestoVar(data.presupuestoVar);
    if(data.categorias) setCategorias(data.categorias);
    if(data.naranja) setNaranja(data.naranja);
    if(data.bbva) setBbva(data.bbva);
    if(data.cuentas) setCuentas(data.cuentas);
    if(data.tiposIngreso) setTiposIngreso(data.tiposIngreso);
    alert('✓ Datos importados correctamente');
  };

  const saldo = saldoBase
    + ingresosExtra.filter(x=>x.cobrado).reduce((a,b)=>a+b.monto,0)
    + sueldosCobrados.reduce((a,b)=>a+b.monto,0)
    - gastosVariables.reduce((a,b)=>a+b.monto,0)
    - gastosSemPagados.reduce((a,b)=>a+b.monto,0)
    - vencimientos.filter(x=>x.pagado&&x.tipo==='gasto').reduce((a,b)=>a+b.monto,0)
    - gastosFijos.filter(x=>x.pagado).reduce((a,b)=>a+b.monto,0);

  return (
    <div className="app">
      <div className="header">
        <h1>💸 Mis Finanzas</h1>
        <div className="io-btns">
          <button className="io-btn" onClick={()=>exportData(getAllData())}>⬇ Exportar</button>
          <button className="io-btn" onClick={()=>importRef.current.click()}>⬆ Importar</button>
          <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>{if(e.target.files[0])importData(e.target.files[0],handleImport);e.target.value='';}} />
        </div>
      </div>

      {TABS.map(t=>(
        <div key={t.id} id={`page-${t.id}`} className={`page ${tab===t.id?'active':''}`}>
          {tab==='dashboard' && t.id==='dashboard' && <Dashboard cuentas={cuentas} vencimientos={vencimientos} gastosVariables={gastosVariables} ingresosExtra={ingresosExtra} presupuestoVar={presupuestoVar} gastosFijos={gastosFijos} setGastosFijos={setGastosFijos} gastosSemPagados={gastosSemPagados} sueldosCobrados={sueldosCobrados} naranja={naranja} bbvaTarjeta={bbva} />}
          {tab==='variables' && t.id==='variables' && <Variables gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} categorias={categorias} setCategorias={setCategorias} gastosSem={gastosSem} cuentas={cuentas} setCuentas={setCuentas} naranja={naranja} setNaranja={setNaranja} bbva={bbva} setBbva={setBbva} />}
          {tab==='ingresos' && t.id==='ingresos' && <Ingresos ingresosExtra={ingresosExtra} setIngresosExtra={setIngresosExtra} tiposIngreso={tiposIngreso} cuentas={cuentas} setCuentas={setCuentas} />}
          {tab==='proyeccion' && t.id==='proyeccion' && <Proyeccion gastosFijos={gastosFijos} vencFijos={vencFijos} naranja={naranja} bbva={bbva} saldoBase={saldoBase} cuentas={cuentas} ingresosExtra={ingresosExtra} sueldosCobrados={sueldosCobrados} vencimientos={vencimientos} gastosSemPagados={gastosSemPagados} gastosVariables={gastosVariables} />}
          {tab==='cuentas' && t.id==='cuentas' && <Cuentas cuentas={cuentas} setCuentas={setCuentas} />}
          {tab==='tarjetas' && t.id==='tarjetas' && <Tarjetas naranja={naranja} setNaranja={setNaranja} bbva={bbva} setBbva={setBbva} categorias={categorias} gastosVariables={gastosVariables} setGastosVariables={setGastosVariables} cuentas={cuentas} setCuentas={setCuentas} />}
          {tab==='reporte' && t.id==='reporte' && <Reporte gastosVariables={gastosVariables} ingresosExtra={ingresosExtra} naranja={naranja} bbva={bbva} cuentas={cuentas} />}
          {tab==='config' && t.id==='config' && <Configuracion categorias={categorias} setCategorias={setCategorias} tiposIngreso={tiposIngreso} setTiposIngreso={setTiposIngreso} />}
        </div>
      ))}

      <nav className="nav">
        {TABS.map(t=>(
          <button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
